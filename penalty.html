<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>VexaBet | Horse Racing</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root { --gold: #f59e0b; --bg: #020617; --track: #1e293b; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: white; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        .header { display: flex; justify-content: space-between; align-items: center; padding: 15px; background: #0f172a; border-bottom: 1px solid #334155; }
        .bal-box { color: var(--gold); font-weight: 900; border: 2px solid var(--gold); padding: 4px 12px; border-radius: 12px; font-size: 14px; }

        /* منطقة السباق */
        .race-container { flex: 1; padding: 10px; position: relative; background: #0f172a; display: flex; flex-direction: column; justify-content: space-around; }
        .track { height: 50px; background: var(--track); border-bottom: 2px solid #334155; position: relative; display: flex; align-items: center; border-radius: 5px; overflow: hidden; }
        .finish-line { position: absolute; right: 20px; top: 0; bottom: 0; width: 10px; background: repeating-linear-gradient(45deg, #fff, #fff 5px, #000 5px, #000 10px); }
        
        .horse { position: absolute; left: 10px; transition: left 0.1s linear; display: flex; align-items: center; gap: 5px; }
        .horse-icon { width: 35px; height: 35px; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5)); }
        .horse-name { font-size: 9px; font-weight: 900; background: rgba(0,0,0,0.5); padding: 2px 5px; border-radius: 4px; }

        /* لوحة التحكم */
        .controls { background: #0f172a; padding: 20px; border-top: 3px solid #1e293b; }
        .bet-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(100px, 1fr)); gap: 10px; margin-bottom: 15px; }
        .bet-card { background: #1e293b; border: 2px solid transparent; border-radius: 12px; padding: 10px; text-align: center; cursor: pointer; transition: 0.2s; }
        .bet-card.active { border-color: var(--gold); background: rgba(245,158,11,0.1); }
        .bet-card .name { display: block; font-size: 11px; margin-bottom: 5px; }
        .bet-card .odd { font-weight: 900; color: var(--gold); font-size: 16px; }

        .input-group { display: flex; gap: 10px; margin-top: 10px; }
        input { flex: 1; background: #020617; border: 1px solid #334155; padding: 12px; border-radius: 10px; color: var(--gold); text-align: center; font-weight: 900; outline: none; }
        .start-btn { flex: 1.5; background: var(--gold); color: black; border: none; border-radius: 10px; font-weight: 900; font-size: 16px; cursor: pointer; }
        .start-btn:disabled { opacity: 0.4; }
    </style>
</head>
<body>

    <div class="header">
        <div style="font-weight:900;">VEXA<span>RACING</span></div>
        <div class="bal-box" id="user-bal">0.00 EGP</div>
    </div>

    <div class="race-container" id="race-field">
        </div>

    <div class="controls">
        <div class="bet-grid" id="bet-options">
            </div>

        <div class="input-group">
            <input type="number" id="bet-amt" value="10" inputmode="numeric">
            <button class="start-btn" id="race-btn" onclick="startRace()">بدأ السباق 🏁</button>
        </div>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-app.js";
    import { getFirestore, doc, onSnapshot, updateDoc, increment } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-firestore.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-auth.js";

    const config = { apiKey: "AIzaSyAzcP_T8x5ouwwKkhadtBTdsUxk3XqwJec", authDomain: "vexa-4b2fb.firebaseapp.com", projectId: "vexa-4b2fb", appId: "1:977620445308:web:fec22230e1fbb30c8881f9" };
    const app = initializeApp(config);
    const db = getFirestore(app);
    const auth = getAuth(app);

    const horses = [
        { id: 0, name: "البرق", color: "#ef4444", odd: 2.10 },
        { id: 1, name: "الصخرة", color: "#3b82f6", odd: 3.50 },
        { id: 2, name: "الريح", color: "#10b981", odd: 1.80 },
        { id: 3, name: "الزعيم", color: "#f59e0b", odd: 5.00 },
        { id: 4, name: "السراب", color: "#a855f7", odd: 12.0 }
    ];

    let balance = 0, uid = "", selectedHorse = null, isRacing = false;

    function horseSvg(color) {
        return `<svg class="horse-icon" viewBox="0 0 512 512" fill="${color}">
            <path d="M495.2 96.2c-12.7-18.7-37.4-23.7-56.1-11l-34 23.1c-13.6-21.7-34.1-39.2-58.4-50.5-23.9-11.2-50.6-16.7-77.5-16.7H256c-24 0-47.5 4.5-69.8 13.3-22.3 8.8-42.3 21.6-58.8 38.1l-14.7 14.7c-31.2 31.2-31.2 81.9 0 113.1l14.7 14.7c16.5 16.5 36.5 29.3 58.8 38.1 22.3 8.8 45.8 13.3 69.8 13.3h13.2c-1.3 12.5-2 25.1-2 37.8v96h-64c-17.7 0-32 14.3-32 32s14.3 32 32 32h192c17.7 0 32-14.3 32-32s-14.3-32-32-32h-64V325.8c0-36.2 12.3-71.4 35-99.7 16.1-20.1 39-33.8 64.5-38.6l31.1-5.9c18.7-3.6 30.9-21.6 27.4-40.3-3.6-18.7-21.6-30.9-40.3-27.4l-31.1 5.9c-10.4 2-20 7.8-27.1 16.4l-11.4 13.8c-10.7-5.5-22.2-9.6-34.1-12.1l20.4-13.9c18.7-12.7 23.7-37.4 11-56.1z"/>
        </svg>`;
    }

    onAuthStateChanged(auth, user => {
        if(user) {
            uid = user.uid;
            onSnapshot(doc(db,"users",uid), d => {
                balance = d.data()?.walletBalance || 0;
                document.getElementById('user-bal').innerText = balance.toFixed(2) + " EGP";
            });
            initUI();
        }
    });

    function initUI() {
        const field = document.getElementById('race-field');
        const options = document.getElementById('bet-options');
        field.innerHTML = '';
        options.innerHTML = '';

        horses.forEach(h => {
            field.innerHTML += `
                <div class="track">
                    <div class="finish-line"></div>
                    <div class="horse" id="horse-${h.id}">
                        ${horseSvg(h.color)}
                        <span class="horse-name">${h.name}</span>
                    </div>
                </div>`;
            
            options.innerHTML += `
                <div class="bet-card" onclick="selectH(${h.id})">
                    <span class="name">${h.name}</span>
                    <span class="odd">x${h.odd}</span>
                </div>`;
        });
    }

    window.selectH = (id) => {
        if(isRacing) return;
        selectedHorse = horses[id];
        document.querySelectorAll('.bet-card').forEach((c, idx) => {
            c.classList.toggle('active', idx === id);
        });
        if(navigator.vibrate) navigator.vibrate(30);
    };

    window.startRace = async () => {
        const amt = parseFloat(document.getElementById('bet-amt').value);
        if(!selectedHorse) return Swal.fire("عفواً", "اختر حصانك أولاً", "warning");
        if(amt > balance || amt <= 0) return Swal.fire("خطأ", "الرصيد غير كافٍ", "error");

        isRacing = true;
        document.getElementById('race-btn').disabled = true;
        await updateDoc(doc(db, "users", uid), { walletBalance: increment(-amt) });

        let winners = [];
        const containerWidth = document.getElementById('race-field').offsetWidth - 80;
        
        const timer = setInterval(() => {
            horses.forEach(h => {
                const el = document.getElementById(`horse-${h.id}`);
                let currentLeft = parseFloat(el.style.left) || 10;
                
                // سرعة عشوائية متغيرة لخلق الإثارة
                const speed = Math.random() * 8 + 2; 
                if(currentLeft < containerWidth) {
                    el.style.left = (currentLeft + speed) + "px";
                } else if (!winners.includes(h.id)) {
                    winners.push(h.id);
                }
            });

            if(winners.length === horses.length) {
                clearInterval(timer);
                finishRace(winners[0], amt);
            }
        }, 50);
    };

    async function finishRace(winnerId, amt) {
        const winner = horses[winnerId];
        let win = false;

        if(selectedHorse.id === winnerId) {
            win = true;
            const payout = amt * winner.odd;
            await updateDoc(doc(db, "users", uid), { walletBalance: increment(payout) });
            Swal.fire("مبروك! 🎉", `حصانك "${winner.name}" وصل الأول! ربحت ${payout.toFixed(2)} ج.م`, "success");
        } else {
            Swal.fire("حظ أوفر", `الفائز هو "${winner.name}". حاول مرة أخرى!`, "error");
        }

        setTimeout(() => {
            isRacing = false;
            document.getElementById('race-btn').disabled = false;
            resetHorses();
        }, 2000);
    }

    function resetHorses() {
        horses.forEach(h => {
            document.getElementById(`horse-${h.id}`).style.left = "10px";
        });
    }
</script>
</body>
</html>
