<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vexa Wheel | الإصدار الاحترافي</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root {
            --primary: #0ea5e9; --accent: #f59e0b; --bg: #020617;
            --success: #10b981; --danger: #ef4444;
        }

        body {
            font-family: 'Cairo', sans-serif; background: var(--bg);
            color: white; margin: 0; padding: 0;
            display: flex; flex-direction: column; min-height: 100vh;
            align-items: center; overflow-x: hidden;
        }

        /* الهيدر */
        .top-nav {
            width: 100%; padding: 15px 20px; display: flex;
            justify-content: space-between; align-items: center;
            background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255,255,255,0.05); box-sizing: border-box;
        }

        .balance-pill {
            background: linear-gradient(90deg, var(--primary), #0284c7);
            padding: 6px 18px; border-radius: 50px; font-weight: 900;
            box-shadow: 0 0 15px rgba(14, 165, 233, 0.4);
        }

        /* حاوية العجلة */
        .wheel-box {
            position: relative; margin: 40px 0;
            width: 320px; height: 320px;
            display: flex; align-items: center; justify-content: center;
        }

        .wheel-pointer {
            position: absolute; top: -15px; left: 50%; transform: translateX(-50%);
            z-index: 20; color: #fff; font-size: 40px;
            filter: drop-shadow(0 0 10px var(--primary));
            animation: bounce 1s infinite;
        }

        @keyframes bounce { 0%, 100% { top: -15px; } 50% { top: -25px; } }

        #wheel-canvas {
            width: 100%; height: 100%; border-radius: 50%;
            border: 10px solid #1e293b;
            box-shadow: 0 0 40px rgba(0,0,0,0.6), 0 0 20px rgba(14, 165, 233, 0.2);
            transition: transform 6s cubic-bezier(0.15, 0, 0.15, 1);
        }

        /* التحكم السفلي */
        .game-controls {
            width: 100%; max-width: 400px; padding: 25px;
            background: rgba(30, 41, 59, 0.5); border-radius: 30px 30px 0 0;
            border-top: 1px solid rgba(255,255,255,0.1);
            backdrop-filter: blur(10px); margin-top: auto;
        }

        .input-card {
            background: rgba(0,0,0,0.3); padding: 15px;
            border-radius: 20px; border: 1px solid rgba(255,255,255,0.05);
            margin-bottom: 20px;
        }

        .input-card label { display: block; font-size: 13px; color: #94a3b8; margin-bottom: 8px; font-weight: 700; text-align: center; }

        .bet-input {
            width: 100%; background: transparent; border: none;
            color: white; font-size: 26px; font-weight: 900;
            text-align: center; font-family: 'Cairo'; outline: none;
        }

        .spin-btn {
            width: 100%; padding: 18px; border-radius: 20px; border: none;
            background: linear-gradient(45deg, var(--primary), #0284c7);
            color: white; font-size: 22px; font-weight: 900; font-family: 'Cairo';
            cursor: pointer; box-shadow: 0 8px 25px rgba(14, 165, 233, 0.4);
            transition: 0.3s;
        }

        .spin-btn:disabled { opacity: 0.6; filter: grayscale(1); cursor: not-allowed; }
    </style>
</head>
<body>

    <div class="top-nav">
        <i class="fas fa-chevron-right" onclick="history.back()"></i>
        <div style="font-weight: 900; letter-spacing: 1px;">VEXA <span style="color:var(--primary)">WHEEL</span></div>
        <div class="balance-pill"><span id="user-bal">0.00</span> <small>ج.م</small></div>
    </div>

    <div class="wheel-box">
        <i class="fas fa-caret-down wheel-pointer"></i>
        <canvas id="wheel-canvas"></canvas>
    </div>

    <div class="game-controls">
        <div class="input-card">
            <label>حدد مبلغ الرهان</label>
            <input type="number" id="bet-amt" class="bet-input" value="10" min="1">
        </div>
        <button id="spin-action" class="spin-btn">جرب حظك الآن</button>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-app.js";
    import { getFirestore, doc, onSnapshot, updateDoc, increment } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-firestore.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAzcP_T8x5ouwwKkhadtBTdsUxk3XqwJec",
        authDomain: "vexa-4b2fb.firebaseapp.com",
        projectId: "vexa-4b2fb",
        appId: "1:977620445308:web:fec22230e1fbb30c8881f9"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    let balance = 0, uid = "", spinning = false, lossCounter = 0;
    const canvas = document.getElementById('wheel-canvas');
    const ctx = canvas.getContext('2d');
    const spinBtn = document.getElementById('spin-action');

    const sectors = [
        { label: "x0", color: "#1e293b" },
        { label: "x1.5", color: "#0ea5e9" },
        { label: "x0.5", color: "#334155" },
        { label: "x3", color: "#10b981" },
        { label: "x0", color: "#0f172a" },
        { label: "x10", color: "#f59e0b" },
        { label: "x0", color: "#1e293b" },
        { label: "x50", color: "#ef4444" }
    ];

    onAuthStateChanged(auth, u => { 
        if(u) { 
            uid = u.uid; 
            onSnapshot(doc(db, "users", uid), d => { 
                balance = d.data().walletBalance || 0; 
                document.getElementById('user-bal').innerText = balance.toFixed(2); 
            }); 
        } 
    });

    function draw() {
        const size = canvas.width = canvas.height = 400;
        const center = size / 2;
        const rad = (2 * Math.PI) / sectors.length;
        const startAngle = -Math.PI / 2; // البداية من الساعة 12

        sectors.forEach((s, i) => {
            const ang = startAngle + (i * rad);
            ctx.beginPath();
            ctx.fillStyle = s.color;
            ctx.moveTo(center, center);
            ctx.arc(center, center, center, ang, ang + rad);
            ctx.fill();
            ctx.strokeStyle = "rgba(255,255,255,0.1)";
            ctx.stroke();

            ctx.save();
            ctx.translate(center, center);
            ctx.rotate(ang + rad / 2);
            ctx.fillStyle = "white";
            ctx.font = "900 22px Cairo";
            ctx.textAlign = "right";
            ctx.fillText(s.label, center - 20, 10);
            ctx.restore();
        });
    }
    draw();

    spinBtn.onclick = async () => {
        const bet = parseFloat(document.getElementById('bet-amt').value);
        if(bet > balance || bet <= 0 || spinning) return;

        spinning = true;
        spinBtn.disabled = true;
        await updateDoc(doc(db, "users", uid), { walletBalance: increment(-bet) });

        // --- خوارزمية سيكولوجية المقامر ---
        let idx = 0;
        let rand = Math.random() * 100;

        if (bet >= 50) {
            // فخ المبالغ الكبيرة (خسارة مؤكدة)
            const loseOptions = [0, 4, 6];
            idx = loseOptions[Math.floor(Math.random() * loseOptions.length)];
            lossCounter++;
        } 
        else if (lossCounter >= 10 && bet <= 20 && Math.random() > 0.7) {
            // حقنة الأمل (الجائزة الكبرى لمبالغ صغيرة بعد خسائر)
            idx = 7; // x50
            lossCounter = 0;
        }
        else {
            // التخدير العادي (مكاسب فكة تخلي اليوزر مكمل)
            if (rand < 65) {
                idx = Math.random() > 0.6 ? 1 : 2; // x1.5 أو x0.5
                lossCounter++;
            } else {
                idx = [0, 4, 6][Math.floor(Math.random() * 3)]; // خسارة صريحة
                lossCounter++;
            }
        }

        // --- حساب التدوير (دقة 100% في المنتصف) ---
        const sectorDeg = 360 / sectors.length;
        const finalDeg = (12 * 360) - (idx * sectorDeg) - (sectorDeg / 2); 
        
        canvas.style.transition = 'transform 6s cubic-bezier(0.15, 0, 0.15, 1)';
        canvas.style.transform = `rotate(${finalDeg}deg)`;

        setTimeout(async () => {
            spinning = false;
            spinBtn.disabled = false;
            
            const resLabel = sectors[idx].label;
            const mult = parseFloat(resLabel.replace('x', ''));
            
            if(mult > 1) {
                const winAmt = bet * mult;
                await updateDoc(doc(db, "users", uid), { walletBalance: increment(winAmt) });
                Swal.fire({
                    title: 'يا بختك!',
                    text: `وقفت على ${resLabel} ومكسبك ${winAmt.toFixed(2)} ج.م`,
                    icon: 'success'
                });
            } else if (mult > 0) {
                const backAmt = bet * mult;
                await updateDoc(doc(db, "users", uid), { walletBalance: increment(backAmt) });
                Swal.fire('قريبة جداً!', `رجعت لك ${backAmt.toFixed(2)} ج.م.. الدور الجاي هو الكبير!`, 'info');
            } else {
                Swal.fire('حظ أوفر', `وقفت على x0.. المرة الجاية فيها الـ x50!`, 'error');
            }
            
            // تثبيت الزاوية الحقيقية برمجياً
            const actualRotation = finalDeg % 360;
            canvas.style.transition = 'none';
            canvas.style.transform = `rotate(${actualRotation}deg)`;
            setTimeout(() => canvas.style.transition = 'transform 6s cubic-bezier(0.15, 0, 0.15, 1)', 50);
        }, 6100);
    };
</script>
</body>
</html>
