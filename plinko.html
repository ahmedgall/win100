<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Win100 | Hi-Lo Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&family=Orbitron:wght@700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root { 
            --gold: #d4af37; --bg: #080808; --card-bg: #ffffff; 
            --safe-bottom: env(safe-area-inset-bottom, 15px);
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            font-family: 'Cairo', sans-serif; background: var(--bg); color: white; 
            height: 100dvh; display: flex; flex-direction: column; overflow: hidden; 
        }

        .header { 
            height: 55px; padding: 0 15px; display: flex; justify-content: space-between; 
            align-items: center; background: #000; border-bottom: 1px solid #1a1a1a; flex-shrink: 0;
        }

        .bal { 
            color: var(--gold); font-weight: 900; border: 1.5px solid var(--gold); 
            padding: 5px 12px; border-radius: 12px; font-size: 13px; background: rgba(212, 175, 55, 0.05);
        }

        #game-area { 
            flex: 1; display: flex; flex-direction: column; align-items: center; 
            justify-content: center; padding: 10px; gap: 15px;
        }
        
        .multiplier-box {
            background: rgba(255,255,255,0.05); padding: 8px 20px; border-radius: 20px;
            border: 1px dashed var(--gold);
        }

        .multiplier-tag { 
            font-family: 'Orbitron', sans-serif; font-size: 28px; color: var(--gold); 
            font-weight: 900; text-shadow: 0 0 15px rgba(212,175,55,0.4); 
        }

        .card-display { 
            width: min(140px, 35vw); aspect-ratio: 2/3; background: var(--card-bg); 
            border-radius: 15px; display: flex; align-items: center; justify-content: center; 
            font-size: 70px; font-weight: 900; color: #000;
            box-shadow: 0 15px 40px rgba(0,0,0,0.6), 0 0 25px rgba(212, 175, 55, 0.2);
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 5px solid #fff; position: relative;
        }

        .controls { 
            background: #111; padding: 20px 20px calc(15px + var(--safe-bottom)); 
            border-top: 1px solid #222; border-radius: 30px 30px 0 0; 
            flex-shrink: 0; display: flex; flex-direction: column; gap: 12px; width: 100%;
        }

        .bet-input { 
            width: 100%; background: #000; border: 1px solid #333; color: var(--gold); 
            padding: 14px; border-radius: 15px; text-align: center; font-weight: 900; 
            font-size: 18px; outline: none;
        }

        .btn-group { display: flex; gap: 12px; width: 100%; }
        
        .btn { 
            flex: 1; height: 58px; border-radius: 15px; border: none; 
            font-weight: 900; font-size: 18px; cursor: pointer; font-family: 'Cairo';
            transition: 0.1s; display: flex; align-items: center; justify-content: center; gap: 8px;
        }

        .up { background: #22c55e; color: #fff; box-shadow: 0 4px 0 #16a34a; }
        .down { background: #ef4444; color: #fff; box-shadow: 0 4px 0 #dc2626; }
        .up:active, .down:active { transform: translateY(3px); box-shadow: none; }

        .start-btn, .cash { background: var(--gold); color: #000; width: 100%; height: 60px; font-size: 19px; box-shadow: 0 4px 0 #b08d28; }
        .start-btn:active, .cash:active { transform: translateY(3px); box-shadow: none; }

        .cash { background: #fff; color: #000; border: 2px solid var(--gold); }

        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }
        .animate-win { animation: pulse 0.4s ease-in-out; }
    </style>
</head>
<body>

    <div class="header">
        <div style="font-weight:900; color:var(--gold); font-size: 18px; font-family: 'Orbitron';">WIN100</div>
        <div class="bal" id="bal">0.00 ج.م</div>
    </div>

    <div id="game-area">
        <div class="multiplier-box">
            <div class="multiplier-tag" id="mult-text">1.00x</div>
        </div>
        <div class="card-display" id="card">?</div>
    </div>

    <div class="controls">
        <input type="number" id="bet-amt" class="bet-input" value="10" inputmode="decimal">
        
        <button id="start-btn" class="btn start-btn">إبدأ التحدي 🃏</button>
        
        <div id="play-controls" style="display: none; width: 100%;">
            <div class="btn-group">
                <button class="btn up" onclick="play('up')">أعلى <i class="fas fa-arrow-up"></i></button>
                <button class="btn down" onclick="play('down')">أقل <i class="fas fa-arrow-down"></i></button>
            </div>
            <button id="cash-btn" class="btn cash" style="display: none; margin-top: 12px;" onclick="cashOut()">إسحب الأرباح 💰</button>
        </div>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-app.js";
    import { getFirestore, doc, onSnapshot, updateDoc, increment } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-firestore.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAzcP_T8x5ouwwKkhadtBTdsUxk3XqwJec",
        authDomain: "vexa-4b2fb.firebaseapp.com",
        projectId: "vexa-4b2fb",
        appId: "1:977620445308:web:71e66418d95c43dc8881f9"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    let balance = 0, uid = "", currentCard = 0, currentMult = 1.0, isPlaying = false, isProcessing = false, currentBet = 0;
    const cardEl = document.getElementById('card');
    const startBtn = document.getElementById('start-btn');
    const playControls = document.getElementById('play-controls');
    const multText = document.getElementById('mult-text');

    onAuthStateChanged(auth, user => {
        if (user) {
            uid = user.uid;
            onSnapshot(doc(db, "users", uid), d => {
                balance = d.data()?.walletBalance || 0;
                document.getElementById('bal').innerText = balance.toFixed(2) + ' ج.م';
            });
        }
    });

    startBtn.onclick = async () => {
        if (isProcessing) return;
        let bet = parseFloat(document.getElementById('bet-amt').value);
        if (bet > balance || bet <= 0) return Swal.fire('عفواً', 'رصيدك لا يكفي', 'error');

        isProcessing = true;
        try {
            await updateDoc(doc(db, "users", uid), { walletBalance: increment(-bet) });
            currentBet = bet;
            isPlaying = true;
            currentMult = 1.0;
            currentCard = Math.floor(Math.random() * 11) + 2; // من 2 لـ 12 عشان نفتح احتمالات
            cardEl.innerText = currentCard;
            startBtn.style.display = 'none';
            playControls.style.display = 'block';
            multText.innerText = `1.00x`;
        } catch(e) { console.error(e); }
        isProcessing = false;
    };

    window.play = async (choice) => {
        if (!isPlaying || isProcessing) return;
        isProcessing = true;

        const nextCard = Math.floor(Math.random() * 13) + 1;
        cardEl.style.transform = 'rotateY(90deg) scale(0.9)';
        
        setTimeout(() => {
            const isWin = (choice === 'up' && nextCard > currentCard) || (choice === 'down' && nextCard < currentCard);
            currentCard = nextCard;
            cardEl.innerText = currentCard;
            cardEl.style.transform = 'rotateY(0deg) scale(1)';

            if (isWin) {
                // الأود الجديد: أول مرة 1.20 وبعدها يزيد 0.15 كل مرة
                if (currentMult === 1.0) currentMult = 1.20;
                else currentMult += 0.15;

                multText.innerText = `${currentMult.toFixed(2)}x`;
                multText.classList.add('animate-win');
                setTimeout(() => multText.classList.remove('animate-win'), 400);
                
                document.getElementById('cash-btn').style.display = 'block';
                if(navigator.vibrate) navigator.vibrate(40);
            } else {
                gameOver();
            }
            isProcessing = false;
        }, 300);
    };

    window.cashOut = async () => {
        if (isProcessing) return;
        isProcessing = true;
        const win = currentBet * currentMult;
        await updateDoc(doc(db, "users", uid), { walletBalance: increment(win) });
        Swal.fire({ title: 'مبروك!', text: `أضفت ${win.toFixed(2)} ج.م لرصيدك`, icon: 'success', background: '#111', color: '#fff' });
        resetGame();
        isProcessing = false;
    };

    function gameOver() {
        if(navigator.vibrate) navigator.vibrate([100, 50, 100]);
        Swal.fire({ title: 'خسرت!', text: `الكارت كان ${currentCard}`, icon: 'error', background: '#111', color: '#fff' });
        resetGame();
    }

    function resetGame() {
        isPlaying = false;
        startBtn.style.display = 'block';
        playControls.style.display = 'none';
        document.getElementById('cash-btn').style.display = 'none';
        cardEl.innerText = '?';
        multText.innerText = `1.00x`;
    }
</script>



<Script>

// كود تحديث النسخة كل 24 ساعة
(function() {
    const lastUpdate = localStorage.getItem('last_app_refresh');
    const now = new Date().getTime();
    const ONE_DAY = 24 * 60 * 60 * 1000; // 24 ساعة بالملي ثانية

    if (!lastUpdate || (now - lastUpdate > ONE_DAY)) {
        localStorage.setItem('last_app_refresh', now);
        window.location.reload(true); // ريفريش إجباري من السيرفر
    }
})();

</Script>



<script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>
</body>
</html>
