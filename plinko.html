<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Win100 | Hi-Lo Mobile</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root { --gold: #d4af37; --bg: #050505; --card-bg: #1a1a1a; }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            font-family: 'Cairo', sans-serif; background: var(--bg); color: white; 
            height: 100vh; height: 100dvh; display: flex; flex-direction: column; 
            overflow: hidden; position: fixed; width: 100%;
        }

        .header { 
            height: 60px; padding: 0 15px; display: flex; justify-content: space-between; 
            align-items: center; background: #000; border-bottom: 1px solid #222; flex-shrink: 0;
        }
        .bal { color: var(--gold); font-weight: 900; border: 1px solid var(--gold); padding: 4px 12px; border-radius: 12px; font-size: 14px; }

        #game-area { 
            flex: 1; display: flex; flex-direction: column; align-items: center; 
            justify-content: center; gap: clamp(10px, 4vh, 20px); padding: 10px; min-height: 0;
        }
        
        .multiplier-tag { font-size: clamp(18px, 5vw, 26px); color: var(--gold); font-weight: 900; text-shadow: 0 0 15px rgba(212,175,55,0.3); }

        .card-display { 
            width: clamp(110px, 38vw, 150px); 
            height: clamp(160px, 55vw, 210px); 
            background: white; border-radius: 20px; 
            display: flex; align-items: center; justify-content: center; 
            font-size: clamp(60px, 18vw, 90px); font-weight: 900; color: #000;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5), 0 0 20px rgba(212, 175, 55, 0.2);
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative; border: 5px solid #fff;
        }

        .controls { 
            background: #111; padding: 15px 20px calc(15px + env(safe-area-inset-bottom, 10px)) 20px; 
            border-top: 1px solid #333; border-radius: 30px 30px 0 0; 
            flex-shrink: 0; display: flex; flex-direction: column; gap: 12px;
            width: 100%; max-width: 500px; margin: 0 auto;
        }

        .bet-input { 
            width: 100%; background: #000; border: 1px solid #333; color: var(--gold); 
            padding: 14px; border-radius: 15px; text-align: center; font-weight: 900; 
            font-size: 18px; outline: none;
        }

        .btn-group { display: flex; gap: 12px; width: 100%; }
        
        .btn { 
            flex: 1; height: 60px; border-radius: 15px; border: none; 
            font-weight: 900; font-size: 18px; cursor: pointer; font-family: 'Cairo';
            transition: 0.1s;
        }
        .btn:active { transform: scale(0.95); }

        .up { background: #22c55e; color: #fff; box-shadow: 0 4px 15px rgba(34, 197, 94, 0.3); }
        .down { background: #ef4444; color: #fff; box-shadow: 0 4px 15px rgba(239, 68, 68, 0.3); }
        .start-btn, .cash { background: var(--gold); color: #000; width: 100%; height: 65px; font-size: 20px; }

        /* تعديلات Swal للموبايل */
        .swal2-popup { border-radius: 25px !important; background: #151515 !important; color: white !important; font-size: 14px !important; }
    </style>
</head>
<body>

    <div class="header">
        <div style="font-weight:900; color:var(--gold); font-size: 18px;">WIN100 HI-LO</div>
        <div class="bal" id="bal">0.00 ج.م</div>
    </div>

    <div id="game-area">
        <div class="multiplier-tag" id="mult-text">المضاعف: 1.00x</div>
        <div class="card-display" id="card">?</div>
    </div>

    <div class="controls">
        <input type="number" id="bet-amt" class="bet-input" value="10" inputmode="decimal" placeholder="الحد الأقصى 500">
        
        <button id="start-btn" class="btn start-btn">إبدأ الجيم 🃏</button>
        
        <div id="play-controls" style="display: none; width: 100%;">
            <div class="btn-group">
                <button class="btn up" onclick="play('up')">أعلى ⬆️</button>
                <button class="btn down" onclick="play('down')">أقل ⬇️</button>
            </div>
            <button id="cash-btn" class="btn cash" style="display: none; margin-top: 12px;" onclick="cashOut()">إسحب الأرباح 💰</button>
        </div>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-app.js";
    import { getFirestore, doc, onSnapshot, updateDoc, increment, getDoc } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-firestore.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-auth.js";

    // البيانات الحقيقية من صورك يا إمبراطور
    const firebaseConfig = {
        apiKey: "AIzaSyAzcP_T8x5ouwwKkhadtBTdsUxk3XqwJec",
        authDomain: "vexa-4b2fb.firebaseapp.com",
        projectId: "vexa-4b2fb",
        appId: "1:977620445308:web:71e66418d95c43dc8881f9"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    let balance = 0, uid = "", currentCard = 0, currentMult = 1.0, isPlaying = false, isProcessing = false;
    let currentBet = 0;
    const cardEl = document.getElementById('card');
    const startBtn = document.getElementById('start-btn');
    const playControls = document.getElementById('play-controls');
    const MAX_BET = 500;

    onAuthStateChanged(auth, user => {
        if (user) {
            uid = user.uid;
            onSnapshot(doc(db, "users", uid), d => {
                balance = d.data()?.walletBalance || 0;
                document.getElementById('bal').innerText = balance.toFixed(2) + ' ج.م';
            });
        }
    });

    startBtn.onclick = async () => {
        if (isProcessing) return;
        let bet = parseFloat(document.getElementById('bet-amt').value);

        if (isNaN(bet) || bet <= 0) return Swal.fire('خطأ', 'أدخل مبلغ صحيح', 'error');
        if (bet > balance) return Swal.fire('خطأ', 'رصيدك لا يكفي', 'error');
        if (bet > MAX_BET) return Swal.fire('تنبيه', `الحد الأقصى ${MAX_BET} ج.م`, 'warning');
        
        isProcessing = true;
        try {
            const userRef = doc(db, "users", uid);
            await updateDoc(userRef, { walletBalance: increment(-bet) });
            
            currentBet = bet;
            isPlaying = true;
            currentMult = 1.0;
            currentCard = Math.floor(Math.random() * 12) + 1;
            cardEl.innerText = currentCard;
            startBtn.style.display = 'none';
            playControls.style.display = 'block';
            document.getElementById('mult-text').innerText = `المضاعف: 1.00x`;
        } catch(e) {
            Swal.fire('خطأ', 'حدثت مشكلة في العملية', 'error');
        } finally { isProcessing = false; }
    };

    window.play = async (choice) => {
        if (!isPlaying || isProcessing) return;
        isProcessing = true;

        const nextCard = Math.floor(Math.random() * 13) + 1;
        cardEl.style.transform = 'scale(0.8) rotateY(90deg)';
        
        setTimeout(() => {
            const isWin = (choice === 'up' && nextCard > currentCard) || 
                          (choice === 'down' && nextCard < currentCard);

            currentCard = nextCard;
            cardEl.innerText = currentCard;
            cardEl.style.transform = 'scale(1) rotateY(0deg)';

            if (isWin) {
                currentMult += 0.3; // ربحك أنت 0.3 زيادة كل مرة
                document.getElementById('mult-text').innerText = `المضاعف: ${currentMult.toFixed(2)}x`;
                document.getElementById('cash-btn').style.display = 'block';
                if(navigator.vibrate) navigator.vibrate(40);
            } else {
                gameOver();
            }
            isProcessing = false;
        }, 300);
    };

    window.cashOut = async () => {
        if (isProcessing || !isPlaying) return;
        isProcessing = true;
        const win = currentBet * currentMult;
        
        try {
            await updateDoc(doc(db, "users", uid), { walletBalance: increment(win) });
            Swal.fire('مبروك!', `ربحت ${win.toFixed(2)} ج.م`, 'success');
            resetGame();
        } catch(e) {
            Swal.fire('خطأ', 'فشل سحب الأرباح', 'error');
        } finally { isProcessing = false; }
    };

    function gameOver() {
        isPlaying = false;
        Swal.fire('خسرت!', `الكارت طلع ${currentCard}`, 'error');
        resetGame();
    }

    function resetGame() {
        isPlaying = false;
        startBtn.style.display = 'block';
        playControls.style.display = 'none';
        document.getElementById('cash-btn').style.display = 'none';
        cardEl.innerText = '?';
        document.getElementById('mult-text').innerText = `المضاعف: 1.00x`;
    }
</script>
</body>
</html>
