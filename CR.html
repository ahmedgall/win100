<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Win100 | Live Aviator</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root { --gold: #f1c40f; --bg: #0d0d0d; --card: #1a1a1a; --success: #2ecc71; --danger: #e74c3c; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            font-family: 'Cairo', sans-serif; background: var(--bg); color: white; 
            margin: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden;
        }

        /* Header */
        .header { height: 60px; display: flex; justify-content: space-between; align-items: center; padding: 0 15px; background: #151515; border-bottom: 1px solid #333; }
        .balance { color: var(--success); font-weight: 900; background: rgba(46,204,113,0.1); padding: 5px 12px; border-radius: 10px; border: 1px solid var(--success); }

        /* Game Area - Responsive Height */
        .game-area { flex: 1; position: relative; background: radial-gradient(circle, #1e1e1e 0%, #000 100%); display: flex; align-items: center; justify-content: center; overflow: hidden; }
        #multiplier { font-size: 18vw; font-weight: 900; z-index: 10; text-shadow: 0 0 30px rgba(255,255,255,0.1); }
        .plane-box { position: absolute; bottom: 20%; left: 10%; z-index: 5; transition: transform 0.1s linear; display: none; }
        .plane-icon { font-size: 50px; color: var(--danger); transform: rotate(-45deg); filter: drop-shadow(0 0 10px var(--danger)); }
        
        #status-msg { position: absolute; top: 15%; color: var(--gold); font-weight: bold; background: rgba(0,0,0,0.6); padding: 5px 15px; border-radius: 20px; z-index: 15; }

        /* Players List */
        .players-section { height: 150px; background: #111; overflow-y: auto; font-size: 12px; border-top: 1px solid #222; }
        .p-row { display: grid; grid-template-columns: 2fr 1fr 1fr; padding: 8px 15px; border-bottom: 1px solid #1a1a1a; align-items: center; }
        .win { color: var(--success); font-weight: bold; }

        /* Controls */
        .controls { background: var(--card); padding: 15px; border-radius: 25px 25px 0 0; box-shadow: 0 -5px 20px rgba(0,0,0,0.5); }
        .input-group { background: #000; border: 1px solid #333; border-radius: 12px; display: flex; align-items: center; margin-bottom: 10px; overflow: hidden; }
        input { flex: 1; background: transparent; border: none; color: var(--gold); font-size: 20px; font-weight: 900; text-align: center; outline: none; padding: 10px; }
        
        .btn { width: 100%; padding: 16px; border-radius: 12px; border: none; font-family: 'Cairo'; font-size: 20px; font-weight: 900; cursor: pointer; transition: 0.3s; }
        .btn-bet { background: var(--success); color: white; }
        .btn-cashout { background: var(--gold); color: black; }
        .btn-wait { background: #333; color: #666; cursor: not-allowed; }
    </style>
</head>
<body>

<div class="header">
    <div style="font-weight: 900; font-size: 18px; color: var(--danger);">WIN100</div>
    <div class="balance" id="wallet">0.00 ج.م</div>
</div>

<div class="game-area">
    <div id="status-msg">في انتظار الجولة...</div>
    <div id="multiplier">1.00x</div>
    <div class="plane-box" id="plane">
        <i class="fas fa-plane plane-icon"></i>
    </div>
</div>

<div class="players-section" id="logs"></div>

<div class="controls">
    <div class="input-group">
        <input type="number" id="amount" value="10" min="10">
    </div>
    <button id="action-btn" class="btn btn-bet">وضع رهان</button>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-app.js";
    import { getFirestore, doc, onSnapshot, updateDoc, increment, setDoc } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-firestore.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-auth.js";

    const config = {
        apiKey: "AIzaSyAzcP_T8x5ouwwKkhadtBTdsUxk3XqwJec",
        authDomain: "vexa-4b2fb.firebaseapp.com",
        projectId: "vexa-4b2fb",
        appId: "1:977620445308:web:fec22230e1fbb30c8881f9"
    };

    const app = initializeApp(config);
    const db = getFirestore(app);
    const auth = getAuth(app);

    let uid = "", balance = 0, myBet = 0, hasBet = false, isFlying = false;
    const arabicNames = ["أحمد علي", "سارة مريم", "محمود كراش", "الجوكر", "سوكا", "حمادة هلال", "البرنس", "أبو نورا", "زيزو", "مروان"];

    // 1. مزامنة المستخدم
    onAuthStateChanged(auth, (user) => {
        if (user) {
            uid = user.uid;
            onSnapshot(doc(db, "users", uid), (s) => {
                balance = s.data().walletBalance || 0;
                document.getElementById('wallet').innerText = balance.toFixed(2) + " ج.م";
            });
        }
    });

    // 2. المزامنة الجماعية (الكل يشوف نفس الجيم)
    // هنستخدم دكيومنت في الفايرستور اسمه "liveGame" عشان نوحد الطيران
    const gameRef = doc(db, "games", "aviator_live");

    onSnapshot(gameRef, (snap) => {
        const data = snap.data();
        if (!data) return;

        const state = data.state; // waiting, flying, crashed
        const currentX = data.multiplier;

        if (state === "waiting") {
            isFlying = false;
            document.getElementById('status-msg').innerText = `الجولة تبدأ خلال: ${data.timer}ث`;
            document.getElementById('multiplier').innerText = "1.00x";
            document.getElementById('multiplier').style.color = "white";
            document.getElementById('plane').style.display = "none";
            if (!hasBet) {
                updateBtn("وضع رهان", "btn-bet");
            }
        } 
        else if (state === "flying") {
            isFlying = true;
            document.getElementById('status-msg').innerText = "طيران مباشر...";
            document.getElementById('multiplier').innerText = currentX.toFixed(2) + "x";
            document.getElementById('plane').style.display = "block";
            
            // تحريك الطيارة
            let moveX = (currentX - 1) * 30;
            let moveY = (currentX - 1) * 20;
            document.getElementById('plane').style.transform = `translate(${moveX}px, ${-moveY}px)`;

            if (hasBet) {
                updateBtn(`كاش أوت (${(myBet * currentX).toFixed(2)})`, "btn-cashout");
            } else {
                updateBtn("انتظر الجولة القادمة", "btn-wait");
            }
            updateBots(currentX);
        } 
        else if (state === "crashed") {
            isFlying = false;
            hasBet = false;
            document.getElementById('multiplier').innerText = "FLEW AWAY!";
            document.getElementById('multiplier').style.color = "var(--danger)";
            updateBtn("انتهت الجولة", "btn-wait");
        }
    });

    // 3. الأكشن (رهان / سحب)
    document.getElementById('action-btn').onclick = async () => {
        const amt = parseFloat(document.getElementById('amount').value);
        
        if (!isFlying && !hasBet) {
            if (amt > balance || amt < 10) return Swal.fire('خطأ', 'الرصيد غير كافي', 'error');
            await updateDoc(doc(db, "users", uid), { walletBalance: increment(-amt) });
            myBet = amt;
            hasBet = true;
            updateBtn("تم الحجز..", "btn-wait");
            addMeToLog(amt);
        } 
        else if (isFlying && hasBet) {
            const currentX = parseFloat(document.getElementById('multiplier').innerText);
            const win = myBet * currentX;
            await updateDoc(doc(db, "users", uid), { walletBalance: increment(win) });
            hasBet = false;
            updateBtn("تم السحب!", "btn-wait");
            Swal.fire({ title: 'مبروك!', text: `كسبت ${win.toFixed(0)} ج.م`, icon: 'success', timer: 1000, showConfirmButton: false });
        }
    };

    function updateBtn(text, cls) {
        const b = document.getElementById('action-btn');
        b.innerText = text;
        b.className = `btn ${cls}`;
    }

    // محاكاة بوتات محلية للتفاعل
    function generateBots() {
        const logs = document.getElementById('logs');
        logs.innerHTML = "";
        const count = Math.floor(Math.random() * 5) + 3;
        for(let i=0; i<count; i++) {
            logs.innerHTML += `
                <div class="p-row" id="bot-${i}" data-exit="${(1.1 + Math.random()*5).toFixed(2)}">
                    <span>👤 ${arabicNames[Math.floor(Math.random()*arabicNames.length)]}</span>
                    <span>${(Math.random()*100 + 10).toFixed(0)}ج</span>
                    <span class="status">طائر..</span>
                </div>`;
        }
    }

    function updateBots(x) {
        document.querySelectorAll('.p-row').forEach(row => {
            if (row.id === "me") return;
            let exit = parseFloat(row.dataset.exit);
            if (x >= exit && row.querySelector('.status').innerText === "طائر..") {
                row.querySelector('.status').innerHTML = `<span class="win">${exit}x</span>`;
            }
        });
    }

    function addMeToLog(amt) {
        const logs = document.getElementById('logs');
        logs.innerHTML = `<div class="p-row" id="me"><span>👤 أنت</span> <span>${amt}ج</span> <span class="status">طائر..</span></div>` + logs.innerHTML;
    }

    // ملاحظة برمجية: عشان اللعبة تتوحد، لازم تعمل سكريبت "Node.js" أو "Cloud Function" يغير قيم aviator_live كل ثانية.
    // مؤقتاً، السيستم هيشتغل معاك بشكل متناسق جداً على الموبايل.
</script>
</body>
</html>
