<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Win100 | Aviator Mobile</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root {
            --gold: #f1c40f; --bg: #0a0a0a; --card: #151515; 
            --text: #ffffff; --success: #22c55e; --danger: #ef4444;
        }

        /* تعديلات الـ Body لضمان عدم وجود سكرول خارجي */
        body {
            font-family: 'Cairo', sans-serif; background: var(--bg); color: var(--text);
            margin: 0; overflow: hidden; display: flex; flex-direction: column; 
            height: 100vh; /* ملء الشاشة بالكامل */
            height: -webkit-fill-available;
        }

        .header {
            padding: 10px 15px; display: flex; justify-content: space-between; align-items: center;
            background: #111; border-bottom: 1px solid #333; flex-shrink: 0;
        }
        
        .balance-box {
            background: rgba(34, 197, 94, 0.1); padding: 5px 12px; border-radius: 10px;
            border: 1px solid var(--success); color: var(--success); font-weight: 900;
            font-size: 14px;
        }

        /* منطقة اللعب تأخذ المساحة المتبقية */
        .game-canvas {
            flex: 1; position: relative; overflow: hidden;
            background: radial-gradient(circle at center, #1a1a1a 0%, #050505 100%);
            display: flex; align-items: center; justify-content: center;
        }

        /* تصغير حجم الخط للموبايل */
        #multiplier { 
            font-size: 18vw; /* حجم نسبي لعرض الشاشة */
            font-weight: 900; z-index: 10; 
            text-shadow: 0 0 20px rgba(255,255,255,0.1); 
        }

        #countdown-timer {
            position: absolute; font-size: 14px; color: var(--gold);
            top: 10%; font-weight: bold; display: none; z-index: 20;
            background: rgba(0,0,0,0.8); padding: 5px 15px; border-radius: 50px;
            border: 1px solid var(--gold);
        }

        .plane-wrapper { position: absolute; bottom: 20%; left: 10%; z-index: 5; display: none; }
        .plane-icon { font-size: 40px; color: var(--danger); transform: rotate(-45deg); filter: drop-shadow(0 0 10px var(--danger)); }

        /* منطقة اللاعبين: طول مرن */
        .players-container {
            display: flex; flex-direction: column; background: #0a0a0a;
            border-top: 1px solid #333; height: 25vh; /* تأخذ 25% من طول الشاشة */
        }

        .players-header { 
            display: grid; grid-template-columns: 2fr 1fr 1.5fr;
            padding: 8px 15px; background: #111; font-size: 11px; color: #777; 
        }

        .players-list { flex: 1; overflow-y: auto; padding: 0 5px; }

        .player-row { 
            display: grid; grid-template-columns: 2fr 1fr 1.5fr; 
            padding: 8px 10px; border-bottom: 1px solid #1a1a1a; font-size: 12px; align-items: center;
        }

        /* منطقة التحكم في الأسفل */
        .control-panel { 
            background: var(--card); padding: 12px 15px; 
            border-radius: 20px 20px 0 0; border-top: 1px solid #333;
            flex-shrink: 0;
        }

        .bet-input-wrapper { 
            background: #000; border: 1px solid #333; border-radius: 10px; 
            display: flex; padding: 2px 10px; margin-bottom: 8px; 
        }

        input { 
            flex-grow: 1; background: transparent; border: none; color: var(--gold); 
            font-size: 18px; font-weight: 900; text-align: center; outline: none;
            padding: 8px 0;
        }

        .btn-action { 
            width: 100%; padding: 12px; border-radius: 10px; border: none; 
            font-size: 18px; font-weight: 900; font-family: 'Cairo'; cursor: pointer; 
        }

        .state-bet { background: var(--success); color: #fff; }
        .state-cashout { background: var(--gold); color: #000; }
        .state-wait { background: #222; color: #555; cursor: not-allowed; }

        .status-win { color: var(--success); font-weight: bold; }
        .status-lost { color: var(--danger); opacity: 0.8; }
        .status-flying { color: #aaa; font-style: italic; animation: pulse 1s infinite; }
        
        @keyframes pulse { 50% { opacity: 0.4; } }
        
        /* تحسين السكرول بار للموبايل */
        .players-list::-webkit-scrollbar { width: 4px; }
        .players-list::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
    </style>
</head>
<body>

    <div class="header">
        <div style="font-weight: 900; font-size: 18px;"><span style="color:var(--danger)">WIN100</span></div>
        <div class="balance-box" id="user-balance">0.00 ج.م</div>
    </div>

    <div class="game-canvas">
        <div id="countdown-timer">بدء في: <span id="secs">5</span>ث</div>
        <div id="multiplier">1.00x</div>
        <div class="plane-wrapper" id="plane">
            <i class="fas fa-plane plane-icon"></i>
        </div>
    </div>

    <div class="players-container">
        <div class="players-header">
            <span>اللاعب</span>
            <span>الرهان</span>
            <span>النتيجة</span>
        </div>
        <div class="players-list" id="players-log"></div>
    </div>

    <div class="control-panel">
        <div class="bet-input-wrapper">
            <input type="number" id="bet-amount" value="10" min="10">
        </div>
        <button id="main-btn" class="btn-action state-bet">وضع رهان</button>
    </div>

<script type="module">
    // (نفس كود الـ JavaScript الخاص بك مع تحسينات بسيطة للحركة)
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-app.js";
    import { getFirestore, doc, onSnapshot, updateDoc, increment } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-firestore.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAzcP_T8x5ouwwKkhadtBTdsUxk3XqwJec",
        authDomain: "vexa-4b2fb.firebaseapp.com",
        projectId: "vexa-4b2fb",
        appId: "1:977620445308:web:fec22230e1fbb30c8881f9"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    let balance = 0, uid = "", isFlying = false, currentMult = 1.0, hasBet = false, myBet = 0;
    
    const arabicNames = [
        "محمد جمال", "أبو مريم", "زيزو", "سوكا", "حمادة", "البرنس", "مروان", "علي", "أم نورا", "الجوكر"
    ];
    
    const mainBtn = document.getElementById('main-btn');
    const multDisplay = document.getElementById('multiplier');
    const timerDisplay = document.getElementById('countdown-timer');
    const plane = document.getElementById('plane');
    const log = document.getElementById('players-log');

    onAuthStateChanged(auth, (user) => {
        if (user) {
            uid = user.uid;
            onSnapshot(doc(db, "users", uid), (snap) => {
                balance = snap.data().walletBalance || 0;
                document.getElementById('user-balance').innerText = balance.toFixed(2) + ' ج.م';
            });
        }
    });

    async function gameLoop() {
        while (true) {
            multDisplay.innerText = "1.00x";
            multDisplay.style.color = "white";
            timerDisplay.style.display = "block";
            plane.style.display = "none";
            plane.style.transform = `translate(0, 0)`;
            generateDynamicBots();
            
            for (let i = 5; i > 0; i--) {
                document.getElementById('secs').innerText = i;
                await new Promise(r => setTimeout(r, 1000));
            }

            timerDisplay.style.display = "none";
            plane.style.display = "block";
            isFlying = true;
            
            if (hasBet) {
                mainBtn.className = "btn-action state-cashout";
            } else {
                mainBtn.className = "btn-action state-wait";
                mainBtn.innerText = "انتظر الجولة التالية";
            }

            let crashPoint = generateCrashPoint();
            await startFlight(crashPoint);

            isFlying = false;
            hasBet = false;
            multDisplay.innerText = "FLEW AWAY!";
            multDisplay.style.color = "var(--danger)";
            handleLosses();
            mainBtn.className = "btn-action state-bet";
            mainBtn.innerText = "وضع رهان";
            
            await new Promise(r => setTimeout(r, 3000));
        }
    }

    function generateCrashPoint() {
        const r = Math.random() * 100;
        if (r < 15) return 1.00; 
        if (r < 75) return (1.1 + Math.random() * 1.4).toFixed(2);
        return (2.5 + Math.random() * 8).toFixed(2);
    }

    function startFlight(limit) {
        return new Promise((resolve) => {
            currentMult = 1.0;
            let interval = setInterval(() => {
                currentMult += 0.01;
                multDisplay.innerText = currentMult.toFixed(2) + "x";
                
                // تحجيم الحركة لتناسب شاشة الموبايل الصغيره
                let x = (currentMult - 1) * (window.innerWidth / 15);
                let y = (currentMult - 1) * (window.innerHeight / 30);
                plane.style.transform = `translate(${x}px, ${-y}px)`;

                if (hasBet) mainBtn.innerText = `كاش أوت (${(myBet * currentMult).toFixed(2)})`;

                updateBotsRealtime(currentMult);

                if (currentMult >= limit) {
                    clearInterval(interval);
                    resolve();
                }
            }, 80);
        });
    }

    function generateDynamicBots() {
        log.innerHTML = "";
        const playersCount = Math.floor(Math.random() * 8) + 3;
        const shuffled = [...arabicNames].sort(() => 0.5 - Math.random());
        
        for(let i=0; i < playersCount; i++) {
            let name = shuffled[i] || "لاعب";
            let bet = (Math.random() * 100 + 10).toFixed(0);
            let targetExit = (1.1 + Math.random() * 4).toFixed(2); 
            
            let row = document.createElement('div');
            row.className = "player-row";
            row.dataset.target = targetExit;
            row.dataset.bet = bet;
            row.innerHTML = `<span>${name}</span><span>${bet}ج</span><span class="status-flying">طائر...</span>`;
            log.prepend(row);
        }
    }

    function updateBotsRealtime(x) {
        document.querySelectorAll('.player-row').forEach(row => {
            let target = parseFloat(row.dataset.target);
            let bet = parseFloat(row.dataset.bet);
            let status = row.querySelector('span:last-child');
            if (x >= target && status.className === "status-flying") {
                status.className = "status-win";
                status.innerHTML = `${(bet * target).toFixed(0)}ج`;
                row.style.background = "rgba(34, 197, 94, 0.05)";
            }
        });
    }

    function handleLosses() {
        document.querySelectorAll('.status-flying').forEach(status => {
            status.className = "status-lost";
            status.innerHTML = `خسر`;
        });
    }

    mainBtn.onclick = async () => {
        if (!isFlying && !hasBet) {
            const amount = parseFloat(document.getElementById('bet-amount').value);
            if (amount > balance || amount < 10) return Swal.fire('عفواً', 'رصيدك غير كافي', 'error');
            
            await updateDoc(doc(db, "users", uid), { walletBalance: increment(-amount) });
            myBet = amount;
            hasBet = true;
            mainBtn.innerText = "تم الحجز..";
            mainBtn.className = "btn-action state-wait";
            
            let myRow = document.createElement('div');
            myRow.className = "player-row";
            myRow.id = "my-bet-row";
            myRow.style.background = "rgba(241, 196, 15, 0.1)";
            myRow.innerHTML = `<span>أنت</span> <span>${amount}ج</span> <span class="status-flying">طائر...</span>`;
            log.prepend(myRow);

        } else if (isFlying && hasBet) {
            const win = myBet * currentMult;
            await updateDoc(doc(db, "users", uid), { walletBalance: increment(win) });
            hasBet = false;
            mainBtn.innerText = "سحب ناجح";
            mainBtn.className = "btn-action state-wait";
            document.querySelector("#my-bet-row span:last-child").className = "status-win";
            document.querySelector("#my-bet-row span:last-child").innerText = win.toFixed(0) + " ج.م";
            Swal.fire({ title: 'مبروك!', text: `ربحت ${win.toFixed(0)} ج.م`, icon: 'success', timer: 1000, showConfirmButton: false });
        }
    };

    gameLoop();
</script>
</body>
</html>
