<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Win100 | Mobile Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root {
            --gold: #d4af37; --bg: #0a0a0a; --card: #151515; --text: #ffffff;
        }

        * { box-sizing: border-box; touch-action: manipulation; }

        body {
            font-family: 'Cairo', sans-serif; background: var(--bg); color: var(--text);
            margin: 0; padding: 0; display: flex; flex-direction: column;
            height: 100dvh; /* مهم جداً للموبايل عشان Address Bar */
            overflow: hidden;
        }

        /* الهيدر المتجاوب */
        .header {
            height: 60px; padding: 0 15px; display: flex; justify-content: space-between; align-items: center;
            background: #111; border-bottom: 1px solid #333; z-index: 100;
        }
        .logo { font-weight: 900; font-size: 20px; color: var(--gold); }
        .balance-box {
            background: rgba(212, 175, 55, 0.1); padding: 5px 12px; border-radius: 10px;
            border: 1px solid var(--gold); font-size: 14px;
        }

        /* منطقة الطيران - مرنة جداً */
        .game-canvas {
            flex: 1; position: relative; background: radial-gradient(circle, #1a1a1a 0%, #000 100%);
            display: flex; align-items: center; justify-content: center; overflow: hidden;
        }

        #multiplier {
            font-size: 18vw; font-weight: 900; z-index: 10; position: relative;
            text-shadow: 0 0 30px rgba(212, 175, 55, 0.3);
        }

        .plane-wrapper {
            position: absolute; bottom: 20%; left: 10%; z-index: 5;
            transition: transform 0.1s linear;
        }
        .plane-icon {
            font-size: 45px; color: var(--gold); transform: rotate(-45deg);
            filter: drop-shadow(0 0 15px var(--gold));
        }

        /* لوحة التحكم السفلية - مصممة للإبهام */
        .control-panel {
            background: var(--card); padding: 20px;
            border-radius: 30px 30px 0 0;
            box-shadow: 0 -10px 30px rgba(0,0,0,0.5);
            display: flex; flex-direction: column; gap: 15px;
        }

        .bet-input-wrapper {
            background: #000; border: 1px solid #333; border-radius: 15px;
            display: flex; align-items: center; padding: 0 15px;
        }
        .bet-input-wrapper label { color: #888; font-size: 14px; white-space: nowrap; }
        input {
            width: 100%; background: transparent; border: none; color: var(--gold);
            font-size: 20px; font-weight: 900; text-align: center; padding: 12px; outline: none;
        }

        .btn-action {
            width: 100%; height: 65px; border-radius: 15px; border: none;
            font-size: 22px; font-weight: 900; font-family: 'Cairo'; cursor: pointer;
            transition: 0.2s;
        }

        .state-bet { background: var(--gold); color: #000; }
        .state-cashout { background: #22c55e; color: #fff; }
        
        .crashed-text { color: #ef4444 !important; animation: shake 0.3s; }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="logo">WIN100</div>
        <div class="balance-box">
            <span id="user-balance">0.00</span>
        </div>
    </div>

    <div class="game-canvas">
        <div id="multiplier">1.00x</div>
        <div class="plane-wrapper" id="plane">
            <i class="fas fa-plane plane-icon"></i>
        </div>
    </div>

    <div class="control-panel">
        <div class="bet-input-wrapper">
            <label>الرهان</label>
            <input type="number" id="bet-amount" value="10" inputmode="decimal">
        </div>
        <button id="main-btn" class="btn-action state-bet">ابدأ الرحلة</button>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-app.js";
    import { getFirestore, doc, onSnapshot, updateDoc, increment } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-firestore.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAzcP_T8x5ouwwKkhadtBTdsUxk3XqwJec",
        authDomain: "vexa-4b2fb.firebaseapp.com",
        projectId: "vexa-4b2fb",
        appId: "1:977620445308:web:fec22230e1fbb30c8881f9"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    let balance = 0, uid = "", isFlying = false, isProcessing = false, currentMult = 1.0, gameLoop;

    onAuthStateChanged(auth, (user) => {
        if (user) {
            uid = user.uid;
            onSnapshot(doc(db, "users", uid), (snap) => {
                balance = snap.data()?.walletBalance || 0;
                document.getElementById('user-balance').innerText = balance.toFixed(2) + ' ج.م';
            });
        }
    });

    const mainBtn = document.getElementById('main-btn');
    const multDisplay = document.getElementById('multiplier');
    const plane = document.getElementById('plane');

    mainBtn.onclick = async () => {
        if (isProcessing) return; // حماية الرصيد من الضغط المتكرر

        if (!isFlying) {
            const betVal = parseFloat(document.getElementById('bet-amount').value);
            if (betVal > balance || betVal <= 0) return Swal.fire('عفواً', 'رصيدك لا يكفي', 'error');

            isProcessing = true;
            isFlying = true;
            
            try {
                await updateDoc(doc(db, "users", uid), { walletBalance: increment(-betVal) });
                mainBtn.innerText = "كاش أوت";
                mainBtn.className = "btn-action state-cashout";
                launch(betVal);
            } finally { isProcessing = false; }
        } else {
            takeProfit();
        }
    };

    function launch(bet) {
        currentMult = 1.0;
        multDisplay.classList.remove('crashed-text');
        const limit = Math.random() > 0.5 ? (Math.random() * 2 + 1).toFixed(2) : 1.00; // مثال سريع للخوارزمية

        gameLoop = setInterval(() => {
            currentMult += 0.01;
            multDisplay.innerText = currentMult.toFixed(2) + 'x';
            
            // حركة الموبايل: محدودة بحدود الشاشة
            let x = Math.min((currentMult - 1) * 30, window.innerWidth * 0.6);
            let y = Math.min(Math.pow(currentMult - 1, 1.2) * 25, window.innerHeight * 0.4);
            plane.style.transform = `translate(${x}px, ${-y}px)`;

            if (currentMult >= limit) boom();
        }, 80);
    }

    async function takeProfit() {
        if (isProcessing) return;
        isProcessing = true;
        clearInterval(gameLoop);
        
        const bet = parseFloat(document.getElementById('bet-amount').value);
        const win = bet * currentMult;
        
        await updateDoc(doc(db, "users", uid), { walletBalance: increment(win) });
        
        Swal.fire({ title: 'عاش يا بطل!', text: `ربحت ${win.toFixed(2)} ج.م`, icon: 'success' });
        isProcessing = false;
        reset();
    }

    function boom() {
        clearInterval(gameLoop);
        multDisplay.innerText = "CRASHED";
        multDisplay.classList.add('crashed-text');
        reset();
    }

    function reset() {
        clearInterval(gameLoop);
        isFlying = false;
        mainBtn.innerText = "ابدأ الرحلة";
        mainBtn.className = "btn-action state-bet";
        setTimeout(() => { if(!isFlying) plane.style.transform = `translate(0, 0)`; }, 1000);
    }
</script>
</body>
</html>
