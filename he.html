<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>سجل المراهنات | Win100 Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --gold: #f59e0b; --bg: #020617; --card: rgba(30, 41, 59, 0.5); --border: rgba(245, 158, 11, 0.2); }
        body { font-family: 'Cairo', sans-serif; background: var(--bg); color: #fff; margin: 0; padding: 15px; padding-bottom: 50px; }
        
        .nav-header { display: flex; align-items: center; margin-bottom: 25px; gap: 15px; position: sticky; top: 0; background: rgba(2, 6, 23, 0.9); backdrop-filter: blur(10px); padding: 15px 0; z-index: 100; border-bottom: 1px solid var(--border); }
        .back-link { color: var(--gold); text-decoration: none; font-size: 20px; transition: 0.3s; }
        .back-link:active { transform: scale(0.8); }

        .bet-card { background: var(--card); border: 1px solid var(--border); border-radius: 24px; padding: 20px; margin-bottom: 18px; position: relative; animation: slideUp 0.4s ease-out forwards; backdrop-filter: blur(5px); }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        
        .status-tag { position: absolute; top: 18px; left: 18px; font-size: 10px; font-weight: 900; padding: 5px 12px; border-radius: 50px; text-transform: uppercase; letter-spacing: 0.5px; }
        .status-pending { background: #475569; color: #fff; }
        .status-won { background: #16a34a; color: #fff; box-shadow: 0 0 15px rgba(22, 163, 74, 0.4); }
        .status-lost { background: #dc2626; color: #fff; }

        .match-row { border-bottom: 1px solid rgba(255,255,255,0.05); padding: 12px 0; }
        .match-row:last-child { border: none; }
        .match-name { font-size: 11px; color: #94a3b8; margin-bottom: 4px; display: block; }
        .pick-info { display: flex; justify-content: space-between; align-items: center; }
        .pick-name { font-size: 14px; font-weight: 700; color: #f8fafc; }
        .pick-odds { color: var(--gold); font-weight: 900; font-size: 14px; }

        .financial-summary { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; background: rgba(0,0,0,0.4); padding: 15px; border-radius: 18px; margin-top: 15px; }
        .summary-box { text-align: center; }
        .summary-box span { display: block; font-size: 9px; color: #64748b; margin-bottom: 4px; text-transform: uppercase; }
        .summary-box b { font-size: 13px; color: #fff; }
        .profit-text { color: #16a34a !important; font-weight: 900; }

        #loader { position: fixed; inset: 0; background: var(--bg); z-index: 9999; display: flex; align-items: center; justify-content: center; }
        .empty-state { text-align: center; margin-top: 80px; opacity: 0.5; }
    </style>
</head>
<body>

    <div id="loader"><i class="fas fa-crown fa-spin" style="font-size: 40px; color: var(--gold);"></i></div>

    <div class="nav-header">
        <a href="al.html" class="back-link"><i class="fas fa-arrow-right"></i></a>
        <h2 style="margin:0; font-size: 18px; font-weight: 900;">سجل العمليات</h2>
    </div>

    <div id="history-container"></div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-app.js";
    import { getFirestore, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-firestore.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-auth.js";

    const firebaseConfig = { 
        apiKey: "AIzaSyAzcP_T8x5ouwwKkhadtBTdsUxk3XqwJec", 
        authDomain: "vexa-4b2fb.firebaseapp.com", 
        projectId: "vexa-4b2fb", 
        appId: "1:977620445308:web:fec22230e1fbb30c8881f9" 
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    onAuthStateChanged(auth, (user) => {
        if(user) { loadHistory(user.uid); } 
        else { window.location.href = 'index.html'; }
    });

    async function loadHistory(uid) {
        const container = document.getElementById('history-container');
        try {
            // سحب البيانات بدون orderBy لتجنب مشاكل الفهارس (Indexes)
            const q = query(collection(db, "myBets"), where("userId", "==", uid));
            const snap = await getDocs(q);
            document.getElementById('loader').style.display = 'none';

            if (snap.empty) {
                container.innerHTML = '<div class="empty-state"><i class="fas fa-box-open fa-3x"></i><p>لا يوجد مراهنات حالية</p></div>';
                return;
            }

            // ترتيب المراهنات برمجياً (الأحدث أولاً)
            const sortedDocs = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }))
                .sort((a, b) => {
                    const timeA = a.timestamp?.seconds || 0;
                    const timeB = b.timestamp?.seconds || 0;
                    return timeB - timeA;
                });

            let html = "";
            sortedDocs.forEach(bet => {
                // منطق الحالات
                let statusText = 'قيد التنفيذ';
                let statusClass = 'status-pending';
                
                if(bet.status === 'won') { statusText = 'رابحة ✅'; statusClass = 'status-won'; }
                if(bet.status === 'lost') { statusText = 'خاسرة ❌'; statusClass = 'status-lost'; }

                const formattedDate = bet.timestamp ? 
                    new Date(bet.timestamp.seconds * 1000).toLocaleString('ar-EG', { day:'2-digit', month:'short', hour:'2-digit', minute:'2-digit' }) 
                    : 'جاري الحفظ...';

                html += `
                    <div class="bet-card">
                        <span class="status-tag ${statusClass}">${statusText}</span>
                        <div style="font-size: 10px; color: #64748b; margin-bottom: 12px;">${formattedDate}</div>
                        
                        <div class="bet-details">
                            ${bet.items.map(item => `
                                <div class="match-row">
                                    <span class="match-name">${item.match}</span>
                                    <div class="pick-info">
                                        <span class="pick-name">${item.pick}</span>
                                        <span class="pick-odds">@${item.price}</span>
                                    </div>
                                </div>
                            `).join('')}
                        </div>

                        <div class="financial-summary">
                            <div class="summary-box"><span>المبلغ</span><b>${bet.amount}</b></div>
                            <div class="summary-box"><span>الأودز</span><b>${bet.totalOdds}</b></div>
                            <div class="summary-box"><span>الربح</span><b class="profit-text">${(bet.amount * bet.totalOdds).toFixed(2)}</b></div>
                        </div>
                    </div>
                `;
            });
            container.innerHTML = html;

        } catch (err) {
            console.error(err);
            document.getElementById('loader').style.display = 'none';
        }
    }
</script>
</body>
</html>
