<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Win100 | الحساب الشخصي</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <style>
        :root {
            --primary: #f59e0b; /* الذهبي الخاص بـ Win100 */
            --primary-glow: rgba(245, 158, 11, 0.3);
            --bg-dark: #020617;
            --card-bg: rgba(30, 41, 59, 0.4);
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --glass-border: rgba(245, 158, 11, 0.2);
        }

        body {
            font-family: 'Cairo', sans-serif;
            background: radial-gradient(circle at top right, #0f172a, #020617);
            background-attachment: fixed;
            color: var(--text-main);
            margin: 0; padding: 25px 20px 110px;
            min-height: 100vh;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        .page-title { 
            font-weight: 900; font-size: 24px; margin-bottom: 25px; 
            display: flex; align-items: center; gap: 12px;
            color: #fff; text-shadow: 0 0 15px var(--primary-glow);
        }

        /* كارت الهوية الذهبي */
        .id-card {
            background: linear-gradient(135deg, #1e293b, #020617);
            border: 1px solid var(--glass-border);
            border-radius: 30px;
            padding: 30px;
            position: relative;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.6);
            margin-bottom: 25px;
            overflow: hidden;
            animation: fadeIn 0.6s ease;
        }

        .id-card::before {
            content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
            background: radial-gradient(circle, rgba(245, 158, 11, 0.08) 0%, transparent 60%);
        }

        .user-meta h2 { margin: 0; font-size: 26px; font-weight: 900; color: #fff; position: relative; }
        .user-meta p { margin: 5px 0 0; font-size: 14px; color: var(--primary); font-weight: 700; position: relative; }

        .v-id-box {
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(10px);
            padding: 15px 20px;
            border-radius: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 25px;
            border: 1px solid var(--glass-border);
            cursor: pointer;
            transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
        }
        
        .v-id-box:hover { border-color: var(--primary); transform: translateY(-3px); }
        .v-id-box:active { transform: scale(0.95); }

        .v-id-label { font-size: 11px; display: block; color: var(--text-dim); font-weight: 700; margin-bottom: 2px; text-transform: uppercase; }
        .v-id-num { font-family: 'Inter'; font-weight: 800; letter-spacing: 2px; font-size: 18px; color: var(--primary); }

        /* القائمة الاحترافية */
        .settings-list {
            background: var(--card-bg);
            border-radius: 28px;
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(15px);
            overflow: hidden;
        }

        .setting-row {
            padding: 22px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--glass-border);
            cursor: pointer;
            transition: 0.3s;
        }
        
        .setting-row:hover { background: rgba(245, 158, 11, 0.05); }
        .setting-row:last-child { border-bottom: none; }
        
        .setting-row i.main-icon { color: var(--primary); width: 30px; font-size: 20px; filter: drop-shadow(0 0 5px var(--primary-glow)); }
        .setting-row span { flex: 1; margin-right: 15px; font-weight: 700; font-size: 15px; color: var(--text-main); }
        .setting-row i.fa-chevron-left { font-size: 12px; color: var(--text-dim); opacity: 0.5; }

        .btn-logout {
            margin-top: 25px;
            width: 100%;
            padding: 18px;
            border-radius: 22px;
            border: 1px solid rgba(239, 68, 68, 0.2);
            background: rgba(239, 68, 68, 0.05);
            color: #ef4444;
            font-family: 'Cairo';
            font-weight: 800;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center; gap: 10px;
            transition: 0.3s;
        }
        
        .btn-logout:hover { background: rgba(239, 68, 68, 0.15); border-color: #ef4444; }

        /* Bottom Nav (Win100 Style) */
        .bottom-nav { 
            position: fixed; bottom: 20px; left: 20px; right: 20px;
            height: 70px; background: rgba(15, 23, 42, 0.9); 
            backdrop-filter: blur(20px); border: 1px solid var(--glass-border); border-radius: 25px;
            z-index: 1000; display: flex; justify-content: space-around; align-items: center; 
        }
        .nav-item { color: var(--text-dim); text-decoration: none; text-align: center; font-size: 11px; }
        .nav-item.active { color: var(--primary); text-shadow: 0 0 10px var(--primary-glow); }
        .nav-item i { font-size: 22px; display: block; margin-bottom: 4px; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="page-title">
        <i class="fas fa-crown" style="color: var(--primary);"></i>
        حسابي الملكي
    </div>

    <div class="id-card">
        <div class="user-meta">
            <h2 id="user-name">جاري المزامنة...</h2>
            <p id="user-phone">01xxxxxxxxx</p>
        </div>
        
        <div class="v-id-box" onclick="copyMyID()">
            <div>
                <span class="v-id-label">معرف فيكسا (VX-ID)</span>
                <span class="v-id-num" id="display-v-id">VX-XXXXXX</span>
            </div>
            <i class="fas fa-copy" style="color: var(--primary); opacity: 0.7;"></i>
        </div>
    </div>

    <div class="settings-list">
        <div class="setting-row" onclick="updateProfileName()">
            <i class="fas fa-user-edit main-icon"></i>
            <span>تعديل الاسم</span>
            <i class="fas fa-chevron-left"></i>
        </div>

        <div class="setting-row" onclick="updateSecurity()">
            <i class="fas fa-shield-check main-icon"></i>
            <span>إعدادات الأمان</span>
            <i class="fas fa-chevron-left"></i>
        </div>

        <div class="setting-row" onclick="Swal.fire({title: 'الدعم الفني', text: 'تواصل مع الإدارة عبر واتساب: 01xxxxxxxxx', icon: 'info', background: '#020617', color: '#fff', confirmButtonColor: '#f59e0b'})">
            <i class="fas fa-headset main-icon"></i>
            <span>مركز الدعم</span>
            <i class="fas fa-chevron-left"></i>
        </div>
    </div>

    <button class="btn-logout" id="logout-btn">
        <i class="fas fa-power-off"></i> خروج من الحساب
    </button>

    <nav class="bottom-nav">
        <a href="home.html" class="nav-item"><i class="fas fa-house"></i><span>الرئيسية</span></a>
        <a href="wallet.html" class="nav-item"><i class="fas fa-wallet"></i><span>المحفظة</span></a>
        <a href="history.html" class="nav-item"><i class="fas fa-clock-rotate-left"></i><span>السجل</span></a>
        <a href="profile.html" class="nav-item active"><i class="fas fa-user-gear"></i><span>حسابي</span></a>
    </nav>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-app.js";
    import { getFirestore, doc, onSnapshot, updateDoc } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-firestore.js";
    import { getAuth, signOut, updatePassword } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAzcP_T8x5ouwwKkhadtBTdsUxk3XqwJec",
        authDomain: "vexa-4b2fb.firebaseapp.com",
        projectId: "vexa-4b2fb",
        appId: "1:977620445308:web:fec22230e1fbb30c8881f9"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    auth.onAuthStateChanged(user => {
        if (user) { fetchUserData(user.uid); } 
        else { window.location.href = "login.html"; }
    });

    function fetchUserData(uid) {
        onSnapshot(doc(db, "users", uid), (snap) => {
            if (snap.exists()) {
                const data = snap.data();
                document.getElementById('user-name').innerText = data.username || "عضو فيكسا";
                document.getElementById('user-phone').innerText = data.phone || "بدون رقم";
                document.getElementById('display-v-id').innerText = `VX-${uid.substring(0, 6).toUpperCase()}`;
            }
        });
    }

    window.copyMyID = () => {
        const id = document.getElementById('display-v-id').innerText;
        navigator.clipboard.writeText(id).then(() => {
            Swal.fire({
                toast: true,
                position: 'top',
                title: 'تم نسخ المعرف بنجاح',
                icon: 'success',
                showConfirmButton: false,
                timer: 1500,
                background: '#f59e0b',
                color: '#000'
            });
        });
    };

    window.updateProfileName = async () => {
        const { value: newName } = await Swal.fire({
            title: 'تعديل الاسم',
            input: 'text',
            background: '#020617',
            color: '#fff',
            confirmButtonColor: '#f59e0b',
            confirmButtonText: 'تحديث',
            inputPlaceholder: 'أدخل الاسم الجديد'
        });

        if (newName) {
            await updateDoc(doc(db, "users", auth.currentUser.uid), { username: newName });
            Swal.fire({ title: 'تم!', icon: 'success', background: '#020617', color: '#fff' });
        }
    };

    document.getElementById('logout-btn').onclick = () => {
        signOut(auth).then(() => window.location.href = "index.html");
    };

    window.updateSecurity = () => {
        Swal.fire({
            title: 'تغيير كلمة المرور',
            icon: 'lock',
            background: '#020617',
            color: '#fff',
            showCancelButton: true,
            confirmButtonText: 'تغيير'
        }).then(async (result) => {
            if (result.isConfirmed) {
                const { value: pass } = await Swal.fire({ title: 'الباسورد الجديد', input: 'password', background: '#020617', color: '#fff' });
                if (pass && pass.length >= 6) {
                    updatePassword(auth.currentUser, pass).then(() => {
                        Swal.fire('تم التغيير!', '', 'success');
                    }).catch(() => Swal.fire('خطأ', 'يرجى تسجيل الدخول مجدداً للأمان', 'error'));
                }
            }
        });
    };
</script>
</body>
</html>
