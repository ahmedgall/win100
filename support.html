        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; }
        body { background: var(--bg); color: white; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 20px; }

        .container { width: 100%; max-width: 500px; text-align: center; margin-top: 40px; }
        
        /* أيقونة SVG للدعم */
        .support-icon { width: 80px; height: 80px; background: rgba(245,158,11,0.1); border-radius: 50%; padding: 15px; margin-bottom: 20px; border: 2px solid var(--gold); display: inline-block; }

        h1 { font-weight: 900; font-size: 28px; margin-bottom: 10px; }
        p { color: var(--text); margin-bottom: 30px; line-height: 1.6; }

        /* كروت التواصل */
        .contact-card { background: var(--card); border: 1px solid #1e293b; border-radius: 20px; padding: 25px; margin-bottom: 15px; transition: 0.3s; text-decoration: none; display: flex; align-items: center; gap: 15px; cursor: pointer; }
        .contact-card:active { transform: scale(0.98); background: #1e293b; }

        .icon-circle { width: 50px; height: 50px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 24px; }
        .tg-bg { background: #229ED9; }
        .mail-bg { background: var(--gold); }

        .info { text-align: right; flex: 1; }
        .info .title { display: block; font-weight: 900; font-size: 16px; color: white; }
        .info .desc { display: block; font-size: 13px; color: var(--text); }

        /* زر التليجرام الرئيسي */
        .btn-main { width: 100%; background: #229ED9; color: white; border: none; padding: 18px; border-radius: 15px; font-weight: 900; font-size: 18px; text-decoration: none; display: flex; align-items: center; justify-content: center; gap: 10px; margin-top: 20px; box-shadow: 0 10px 20px rgba(34, 158, 217, 0.2); }

        .footer { margin-top: auto; padding: 20px; color: #334155; font-size: 12px; font-weight: 900; letter-spacing: 1px; }
    </style>
</head>
