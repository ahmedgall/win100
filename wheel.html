<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Win100 | Pro Lucky Wheel</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root { --gold: #f59e0b; --bg: #020617; --card: #0f172a; --accent: #10b981; }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; }
        
        body { 
            font-family: 'Cairo', sans-serif; 
            background: var(--bg); 
            color: white; 
            height: 100vh; 
            display: flex; 
            flex-direction: column; 
            overflow: hidden; 
        }

        .header { 
            padding: 10px 20px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            background: rgba(15, 23, 42, 0.95); 
            border-bottom: 1px solid rgba(255,255,255,0.05); 
            z-index: 100;
        }

        .bal-badge { 
            background: rgba(245, 158, 11, 0.1); 
            border: 1.5px solid var(--gold); 
            padding: 4px 12px; 
            border-radius: 50px; 
            display: flex; 
            align-items: center; 
            gap: 6px;
        }

        .bal-amt { color: var(--gold); font-weight: 900; font-size: 16px; }

        /* منطقة العجلة متجاوبة */
        .wheel-section { 
            flex: 1; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            position: relative; 
            padding: 10px;
        }

        .wheel-outer { 
            position: relative; 
            width: 85vw; 
            max-width: 320px; 
            aspect-ratio: 1;
            filter: drop-shadow(0 0 30px rgba(245, 158, 11, 0.2)); 
        }
        
        .pointer { 
            position: absolute; 
            top: -12px; 
            left: 50%; 
            transform: translateX(-50%); 
            width: 40px; 
            height: 40px; 
            z-index: 50; 
        }

        canvas { 
            width: 100%; 
            height: 100%; 
            border-radius: 50%; 
            border: 6px solid #1e293b; 
            transition: transform 5s cubic-bezier(0.2, 0, 0.1, 1); 
            background: #000;
        }

        /* التحكم السفلي */
        .controls { 
            background: #0f172a; 
            padding: 20px 20px calc(20px + env(safe-area-inset-bottom)); 
            border-top: 1px solid rgba(255,255,255,0.1); 
            border-radius: 25px 25px 0 0; 
            box-shadow: 0 -10px 40px rgba(0,0,0,0.5);
        }

        .input-box { 
            background: #020617; 
            border: 1.5px solid #1e293b; 
            border-radius: 15px; 
            display: flex; 
            align-items: center; 
            padding: 2px 15px; 
            margin-bottom: 15px; 
        }

        input { 
            flex: 1; 
            background: transparent; 
            border: none; 
            color: var(--gold); 
            padding: 12px; 
            text-align: center; 
            font-weight: 900; 
            font-size: 22px; 
            outline: none; 
        }
        
        .spin-btn { 
            width: 100%; 
            padding: 16px; 
            border-radius: 15px; 
            border: none; 
            background: linear-gradient(135deg, #f59e0b, #d97706); 
            color: #000; 
            font-weight: 900; 
            font-size: 19px; 
            box-shadow: 0 5px 15px rgba(245, 158, 11, 0.3);
        }

        .spin-btn:active { transform: scale(0.98); }
        .spin-btn:disabled { opacity: 0.5; filter: grayscale(1); }
        
        #status { text-align: center; color: #64748b; margin-top: 12px; font-weight: 700; font-size: 14px; min-height: 20px; }
    </style>
</head>
<body>

    <div class="header">
        <div style="font-weight:900; font-size: 20px;">WIN<span style="color:var(--gold)">100</span></div>
        <div class="bal-badge">
            <span class="bal-amt" id="bal">0.00</span>
            <svg viewBox="0 0 24 24" width="16" fill="var(--gold)"><circle cx="12" cy="12" r="10"/><path d="M12 6v12M8 12h8" stroke="#000" stroke-width="2"/></svg>
        </div>
    </div>

    <div class="wheel-section">
        <div class="wheel-outer">
            <svg class="pointer" viewBox="0 0 50 50">
                <path d="M25 50 L12 10 A5 5 0 0 1 17 5 L33 5 A5 5 0 0 1 38 10 Z" fill="#f59e0b" stroke="#fff" stroke-width="2"/>
            </svg>
            <canvas id="wheelCanvas" width="500" height="500"></canvas>
        </div>
        <div id="status">جاهز للمكسب؟</div>
    </div>

    <div class="controls">
        <div class="input-box">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--gold)" stroke-width="2.5"><path d="M12 1v22M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/></svg>
            <input type="number" id="bet-amt" value="10" inputmode="numeric">
        </div>
        <button id="spin-btn" class="spin-btn">إبرام العجلة 🎡</button>
        <div id="status"></div>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-app.js";
    import { getFirestore, doc, onSnapshot, updateDoc, increment, getDoc } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-firestore.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAzcP_T8x5ouwwKkhadtBTdsUxk3XqwJec",
        authDomain: "vexa-4b2fb.firebaseapp.com",
        projectId: "vexa-4b2fb",
        appId: "1:977620445308:web:fec22230e1fbb30c8881f9"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    const canvas = document.getElementById("wheelCanvas");
    const ctx = canvas.getContext("2d");
    const spinBtn = document.getElementById("spin-btn");
    const statusText = document.getElementById("status");

    const sectors = [
        { label: "0x", color: "#0f172a", weight: 45, mult: 0 },
        { label: "2x", color: "#f59e0b", weight: 10, mult: 2 },
        { label: "0.5x", color: "#1e293b", weight: 35, mult: 0.5 },
        { label: "1.2x", color: "#475569", weight: 20, mult: 1.2 },
        { label: "0x", color: "#0f172a", weight: 45, mult: 0 },
        { label: "5x", color: "#10b981", weight: 4, mult: 5 },
        { label: "0.2x", color: "#1e293b", weight: 35, mult: 0.2 },
        { label: "JACKPOT", color: "#ef4444", weight: 1, mult: 50 }
    ];

    let currentRotation = 0;
    let balance = 0, uid = "";

    function drawWheel() {
        const arc = (Math.PI * 2) / sectors.length;
        ctx.clearRect(0, 0, 500, 500);
        sectors.forEach((s, i) => {
            const angle = i * arc;
            ctx.beginPath(); ctx.fillStyle = s.color; ctx.moveTo(250, 250);
            ctx.arc(250, 250, 250, angle, angle + arc); ctx.fill();
            ctx.save(); ctx.translate(250, 250); ctx.rotate(angle + arc / 2);
            ctx.textAlign = "right"; ctx.fillStyle = "white"; ctx.font = "bold 28px Cairo";
            ctx.fillText(s.label, 230, 10); ctx.restore();
        });
    }

    onAuthStateChanged(auth, user => {
        if (user) {
            uid = user.uid;
            onSnapshot(doc(db, "users", uid), d => {
                balance = d.data()?.walletBalance || 0;
                document.getElementById('bal').innerText = balance.toFixed(2);
            });
        }
    });

    spinBtn.onclick = async () => {
        const bet = parseFloat(document.getElementById('bet-amt').value);
        if (bet > balance || bet <= 0) return Swal.fire({title:"عفواً", text:"رصيدك غير كافٍ", icon:"warning", background:"#0f172a", color:"#fff"});

        spinBtn.disabled = true;
        statusText.innerText = "جاري تدوير الحظ...";
        await updateDoc(doc(db, "users", uid), { walletBalance: increment(-bet) });

        const userSnap = await getDoc(doc(db, "users", uid));
        const gameCount = userSnap.data()?.wheelGames || 0;
        
        let selectedIndex;
        // خوارزمية السنارة: أول جيمين 2x (أندكس 1)
        if (gameCount < 2) {
            selectedIndex = 1; 
        } else {
            const totalWeight = sectors.reduce((a, b) => a + b.weight, 0);
            let r = Math.random() * totalWeight;
            for (let i = 0; i < sectors.length; i++) {
                r -= sectors[i].weight;
                if (r <= 0) { selectedIndex = i; break; }
            }
        }

        const sectorArc = 360 / sectors.length;
        // المعادلة المصححة مع إزاحة السهم العلوي
        const targetAngle = (360 - (selectedIndex * sectorArc) - (sectorArc / 2) - 90);
        const finalRotation = currentRotation + 3600 + (targetAngle - (currentRotation % 360));

        canvas.style.transform = `rotate(${finalRotation}deg)`;
        currentRotation = finalRotation;

        setTimeout(async () => {
            const result = sectors[selectedIndex];
            const winAmt = bet * result.mult;
            await updateDoc(doc(db, "users", uid), { walletBalance: increment(winAmt), wheelGames: increment(1) });
            
            spinBtn.disabled = false;
            statusText.innerText = winAmt > bet ? `مبروك! ربحت ${winAmt.toFixed(2)} 💰` : (winAmt > 0 ? "رجعتلك شوية فكة!" : "حظ أوفر المرة الجاية");
            if(winAmt > bet && navigator.vibrate) navigator.vibrate(80);
        }, 5000);
    };

    drawWheel();
</script>
</body>
</html>
