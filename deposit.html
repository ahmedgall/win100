<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Win100 | الوكيل المعتمد</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root { 
            --primary: #f59e0b; 
            --tg-color: #229ED9;
            --card-bg: rgba(15, 23, 42, 0.8);
        }
        
        body { 
            font-family: 'Cairo', sans-serif; 
            background: radial-gradient(circle at top, #1e293b, #020617);
            color: white; margin: 0; padding: 20px; 
            min-height: 100vh; display: flex; align-items: center; justify-content: center;
        }

        .agent-card {
            background: var(--card-bg); 
            backdrop-filter: blur(20px); 
            border-radius: 35px;
            padding: 30px; 
            border: 1px solid rgba(245, 158, 11, 0.2);
            width: 100%; max-width: 400px; 
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.6);
            text-align: center;
            position: relative; overflow: hidden;
        }

        /* توهج خلفي */
        .agent-card::before {
            content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
            background: radial-gradient(circle, rgba(245,158,11,0.05) 0%, transparent 70%);
            z-index: -1;
        }

        .profile-img {
            width: 100px; height: 100px; border-radius: 50%;
            border: 3px solid var(--primary); margin: 0 auto 15px;
            background: #0f172a; display: flex; align-items: center; justify-content: center;
            box-shadow: 0 0 20px rgba(245, 158, 11, 0.3);
        }

        .badge-verified { color: #38bdf8; font-size: 18px; margin-right: 5px; }

        .amount-box {
            background: rgba(0,0,0,0.4); border-radius: 20px; padding: 20px; margin: 25px 0;
            border: 1px solid rgba(255,255,255,0.05);
        }

        input {
            width: 100%; border: none; background: transparent;
            color: var(--primary); font-size: 30px; font-weight: 900;
            text-align: center; outline: none; font-family: 'Cairo';
        }

        .btn-tg {
            width: 100%; padding: 18px; border-radius: 20px; border: none;
            background: linear-gradient(135deg, var(--tg-color), #0077b5);
            color: white; font-weight: 900; font-size: 18px;
            cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px;
            transition: 0.3s;
        }

        .btn-tg:hover { transform: scale(1.03); box-shadow: 0 10px 25px rgba(34, 158, 217, 0.4); }

        .status-dot { width: 10px; height: 10px; background: #10b981; border-radius: 50%; display: inline-block; margin-left: 5px; box-shadow: 0 0 10px #10b981; }
    </style>
</head>
<body>

    <div class="agent-card">
        <div class="profile-img">
            <i class="fas fa-user-tie fa-4x" style="color: var(--primary);"></i>
        </div>

        <h2 style="margin: 0; font-weight: 900;">محمد جمال <i class="fas fa-check-circle badge-verified"></i></h2>
        <p style="color: #94a3b8; font-size: 13px; margin: 5px 0 15px;">الوكيل الرسمي المعتمد لـ Win100</p>
        
        <div style="font-size: 12px; color: #10b981; font-weight: 700;">
            <span class="status-dot"></span> متصل الآن (جاهز للشحن)
        </div>

        <div class="amount-box">
            <label style="display: block; font-size: 12px; color: #64748b; margin-bottom: 10px;">أدخل مبلغ الإيداع (EGP)</label>
            <input type="number" id="deposit-val" placeholder="0.00">
        </div>

        <button class="btn-tg" id="contact-btn">
            <i class="fab fa-telegram-plane fa-lg"></i> تواصل مع محمد جمال
        </button>

        <p style="font-size: 11px; color: #475569; margin-top: 20px; line-height: 1.6;">
            * سيتم فتح تطبيق تليجرام تلقائياً.<br>
            * اطلب تفاصيل التحويل فور دخولك المحادثة.
        </p>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAzcP_T8x5ouwwKkhadtBTdsUxk3XqwJec",
        authDomain: "vexa-4b2fb.firebaseapp.com",
        projectId: "vexa-4b2fb",
        appId: "1:977620445308:web:fec22230e1fbb30c8881f9"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    let userID = "غير معروف";

    onAuthStateChanged(auth, (user) => {
        if (!user) window.location.href = 'index.html';
        else userID = user.uid;
    });

    document.getElementById('contact-btn').addEventListener('click', function() {
        const amount = document.getElementById('deposit-val').value;

        if (!amount || amount < 20) {
            return Swal.fire({ title: 'خطأ في المبلغ', text: 'أقل مبلغ للشحن هو 20 ج.م', icon: 'error', background: '#0f172a', color: '#fff' });
        }

        const username = "k_8562"; // حسابك
        const text = encodeURIComponent(`👋 أهلاً أستاذ محمد جمال،\nأريد شحن رصيد في Win100\n━━━━━━━━━━━━━━━\n💰 المبلغ: ${amount} EGP\n🆔 المعرف: ${userID}\n━━━━━━━━━━━━━━━\nأرسل لي رقم التحويل من فضلك.`);

        // الحل النهائي لمشكلة التحويل:
        const telegramUrl = `https://t.me/${username}?text=${text}`;
        
        // محاولة الفتح بأكثر من طريقة لضمان العمل على الموبايل
        window.location.assign(telegramUrl); 
    });
</script>

</body>
</html>
