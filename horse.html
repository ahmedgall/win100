<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>VexaBet | Pro Horse Racing</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root { --gold: #f59e0b; --bg: #020617; --track: #1e293b; --finish: #facc15; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; -webkit-tap-highlight-color: transparent; user-select: none; }
        
        body { 
            background: var(--bg); color: white; height: 100dvh; 
            display: flex; flex-direction: column; overflow: hidden; 
        }

        .header { 
            height: 60px; display: flex; justify-content: space-between; align-items: center; 
            padding: 0 15px; background: #0f172a; border-bottom: 2px solid var(--gold); flex-shrink: 0; z-index: 10;
        }
        .brand { font-weight: 900; font-size: 18px; letter-spacing: 1px; }
        .brand span { color: var(--gold); }
        .bal-box { color: var(--gold); font-weight: 900; border: 1.5px solid var(--gold); padding: 4px 12px; border-radius: 10px; font-size: 14px; background: rgba(0,0,0,0.3); }

        /* مضمار السباق */
        .race-container { 
            flex: 1; padding: 15px 10px; background: linear-gradient(to bottom, #020617, #0f172a); 
            display: flex; flex-direction: column; justify-content: space-around; 
            position: relative; overflow: hidden;
        }

        .track { 
            height: 15%; min-height: 50px; background: var(--track); 
            border-radius: 12px; position: relative; 
            display: flex; align-items: center; box-shadow: inset 0 0 15px rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.05);
        }

        .finish-line { 
            position: absolute; right: 45px; top: 0; bottom: 0; width: 12px; 
            background: repeating-linear-gradient(0deg, #fff, #fff 6px, #000 6px, #000 12px);
            opacity: 0.8; border-left: 2px solid var(--finish);
        }
        
        .horse { 
            position: absolute; left: 10px; transition: left 0.1s linear; 
            display: flex; flex-direction: column; align-items: center; z-index: 5;
        }
        .horse-icon { width: 38px; height: 38px; filter: drop-shadow(0 4px 6px rgba(0,0,0,0.6)); }
        .horse-name { 
            font-size: 9px; font-weight: 900; background: var(--gold); color: black;
            padding: 0px 6px; border-radius: 4px; margin-top: -5px; white-space: nowrap;
        }

        /* لوحة التحكم السفلية */
        .controls { 
            background: #0f172a; padding: 15px 15px calc(15px + env(safe-area-inset-bottom)); 
            border-top: 1px solid #334155; border-radius: 25px 25px 0 0; flex-shrink: 0;
            box-shadow: 0 -10px 30px rgba(0,0,0,0.5);
        }

        .bet-grid { 
            display: flex; gap: 10px; overflow-x: auto; padding-bottom: 15px;
            scroll-snap-type: x mandatory; -webkit-overflow-scrolling: touch;
        }
        .bet-grid::-webkit-scrollbar { display: none; }

        .bet-card { 
            min-width: 90px; background: #1e293b; border: 2px solid transparent; 
            border-radius: 15px; padding: 10px; text-align: center; transition: 0.3s;
            scroll-snap-align: start;
        }
        .bet-card.active { border-color: var(--gold); background: rgba(245,158,11,0.2); transform: translateY(-5px); }
        .bet-card .name { display: block; font-size: 11px; font-weight: 700; margin-bottom: 4px; }
        .bet-card .odd { font-weight: 900; color: var(--gold); font-size: 16px; }

        .input-group { display: flex; gap: 12px; }
        input { 
            flex: 1; background: #020617; border: 2px solid #334155; padding: 12px; 
            border-radius: 15px; color: var(--gold); text-align: center; font-weight: 900; font-size: 20px; outline: none; 
        }
        .start-btn { 
            flex: 1.5; background: linear-gradient(135deg, #f59e0b, #d97706); 
            color: black; border: none; border-radius: 15px; font-weight: 900; font-size: 18px; 
            box-shadow: 0 4px 0 #92400e; transition: 0.1s;
        }
        .start-btn:active { transform: translateY(3px); box-shadow: none; }
        .start-btn:disabled { opacity: 0.4; filter: grayscale(1); }

        /* أنيميشن الركض */
        @keyframes gallop {
            0%, 100% { transform: translateY(0) rotate(0); }
            50% { transform: translateY(-3px) rotate(2deg); }
        }
        .racing-anim { animation: gallop 0.2s infinite; }
    </style>
</head>
<body>

    <div class="header">
        <div class="brand">VEXA<span>RACING</span></div>
        <div class="bal-box" id="user-bal">0.00 EGP</div>
    </div>

    <div class="race-container" id="race-field">
        </div>

    <div class="controls">
        <div class="bet-grid" id="bet-options">
            </div>

        <div class="input-group">
            <input type="number" id="bet-amt" value="10" inputmode="numeric">
            <button class="start-btn" id="race-btn">انطلاق السباق! 🏇</button>
        </div>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-app.js";
    import { getFirestore, doc, onSnapshot, updateDoc, increment } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-firestore.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-auth.js";

    const config = { apiKey: "AIzaSyAzcP_T8x5ouwwKkhadtBTdsUxk3XqwJec", authDomain: "vexa-4b2fb.firebaseapp.com", projectId: "vexa-4b2fb", appId: "1:977620445308:web:fec22230e1fbb30c8881f9" };
    const app = initializeApp(config);
    const db = getFirestore(app);
    const auth = getAuth(app);

    const horses = [
        { id: 0, name: "البرق", color: "#ef4444", odd: 2.50 },
        { id: 1, name: "كحيلان", color: "#3b82f6", odd: 4.00 },
        { id: 2, name: "الريح", color: "#10b981", odd: 1.90 },
        { id: 3, name: "صقر", color: "#f59e0b", odd: 6.00 },
        { id: 4, name: "الأسد", color: "#a855f7", odd: 10.0 }
    ];

    let balance = 0, uid = "", selectedHorse = null, isRacing = false;

    // SVG حصان احترافي
    function horseSvg(color) {
        return `<svg class="horse-icon" viewBox="0 0 512 512" fill="${color}">
            <path d="M414.7 96c-17.7 0-32 14.3-32 32s14.3 32 32 32h11.1c-14.8 53-61.9 96-121.8 96H256c-17.7 0-32 14.3-32 32s14.3 32 32 32h1.4c-1.3 12.5-2 25.1-2 37.8V448c0 17.7 14.3 32 32 32s32-14.3 32-32V352c0-36.2 12.3-71.4 35-99.7 16.1-20.1 39-33.8 64.5-38.6l31.1-5.9c18.7-3.6 30.9-21.6 27.4-40.3s-21.6-30.9-40.3-27.4l-31.1 5.9c-10.4 2-20 7.8-27.1 16.4l-11.4 13.8c-10.7-5.5-22.2-9.6-34.1-12.1l20.4-13.9c18.7-12.7 23.7-37.4 11-56.1S433.4 83.3 414.7 96z"/>
        </svg>`;
    }

    onAuthStateChanged(auth, user => {
        if(user) {
            uid = user.uid;
            onSnapshot(doc(db,"users",uid), d => {
                balance = d.data()?.walletBalance || 0;
                document.getElementById('user-bal').innerText = balance.toFixed(2) + " EGP";
            });
            initUI();
        }
    });

    function initUI() {
        const field = document.getElementById('race-field');
        const options = document.getElementById('bet-options');
        field.innerHTML = ''; options.innerHTML = '';

        horses.forEach(h => {
            field.innerHTML += `
                <div class="track">
                    <div class="finish-line"></div>
                    <div class="horse" id="horse-${h.id}" style="left:10px">
                        ${horseSvg(h.color)}
                        <span class="horse-name">${h.name}</span>
                    </div>
                </div>`;
            
            const card = document.createElement('div');
            card.className = 'bet-card';
            card.onclick = () => {
                if(isRacing) return;
                selectedHorse = h;
                document.querySelectorAll('.bet-card').forEach(c => c.classList.remove('active'));
                card.classList.add('active');
                if(navigator.vibrate) navigator.vibrate(40);
            };
            card.innerHTML = `<span class="name">${h.name}</span><span class="odd">x${h.odd.toFixed(2)}</span>`;
            options.appendChild(card);
        });
    }

    document.getElementById('race-btn').onclick = async () => {
        const amt = parseFloat(document.getElementById('bet-amt').value);
        if(!selectedHorse) return Swal.fire("عفواً", "اختر حصانك الرابح أولاً", "warning");
        if(amt > balance || amt <= 0) return Swal.fire("رصيد ناقص", "اشحن محفظتك للمتابعة", "error");

        isRacing = true;
        document.getElementById('race-btn').disabled = true;
        await updateDoc(doc(db, "users", uid), { walletBalance: increment(-amt) });

        // إضافة تأثير الركض لجميع الخيول
        document.querySelectorAll('.horse-icon').forEach(icon => icon.classList.add('racing-anim'));

        const trackWidth = document.querySelector('.track').offsetWidth - 80;
        let winners = [];
        let horsePositions = horses.map(() => 10);

        const raceTimer = setInterval(() => {
            horses.forEach((h, index) => {
                // خوارزمية حركة عشوائية متذبذبة (Fluctuating Speed)
                // ده اللي بيخلي الحصان يسبق ويرجع تاني في الترتيب
                const boost = Math.random() > 0.8 ? 8 : 2; 
                const step = (Math.random() * boost) + 1;
                
                if(horsePositions[index] < trackWidth) {
                    horsePositions[index] += step;
                    document.getElementById(`horse-${h.id}`).style.left = horsePositions[index] + "px";
                } else if (!winners.includes(h.id)) {
                    winners.push(h.id);
                }
            });

            if(winners.length === horses.length) {
                clearInterval(raceTimer);
                document.querySelectorAll('.horse-icon').forEach(icon => icon.classList.remove('racing-anim'));
                processResult(winners[0], amt);
            }
        }, 60);
    };

    async function processResult(winnerId, amt) {
        const winner = horses.find(h => h.id === winnerId);
        const isUserWinner = selectedHorse.id === winnerId;
        
        if(isUserWinner) {
            const payout = amt * selectedHorse.odd;
            await updateDoc(doc(db, "users", uid), { walletBalance: increment(payout) });
            
            Swal.fire({
                title: "فوز مستحق! 🏆",
                html: `حصانك <b>${winner.name}</b> وصل للمركز الأول!<br><span style="color:#f59e0b; font-size: 1.2em;">ربحت ${payout.toFixed(2)} ج.م</span>`,
                icon: "success",
                confirmButtonText: "استلام الأرباح"
            });
            if(navigator.vibrate) navigator.vibrate([100, 50, 100, 50, 100]);
        } else {
            Swal.fire({
                title: "حظ أوفر المرة القادمة",
                text: `الفائز هو "${winner.name}"، حصانك تعثر قليلاً`,
                icon: "error",
                confirmButtonText: "حاول مجدداً"
            });
        }

        setTimeout(() => {
            isRacing = false;
            document.getElementById('race-btn').disabled = false;
            horses.forEach(h => {
                const el = document.getElementById(`horse-${h.id}`);
                el.style.left = "10px";
            });
        }, 2000);
    }
</script>
</body>
</html>
