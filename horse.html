<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>VexaBet | Pro Horse Racing</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root { --gold: #f59e0b; --bg: #020617; --track: #1e293b; --finish: #facc15; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; -webkit-tap-highlight-color: transparent; }
        
        body { 
            background: var(--bg); color: white; height: 100dvh; 
            display: flex; flex-direction: column; overflow: hidden; 
        }

        .header { 
            height: 60px; display: flex; justify-content: space-between; align-items: center; 
            padding: 0 15px; background: #0f172a; border-bottom: 1px solid #334155; flex-shrink: 0;
        }
        .brand { font-weight: 900; font-size: 18px; }
        .brand span { color: var(--gold); }
        .bal-box { color: var(--gold); font-weight: 900; border: 1.5px solid var(--gold); padding: 4px 12px; border-radius: 10px; font-size: 13px; }

        /* منطقة السباق - مرنة */
        .race-container { 
            flex: 1; padding: 10px 5px; background: #020617; 
            display: flex; flex-direction: column; justify-content: space-evenly; 
            position: relative; overflow: hidden;
        }

        .track { 
            height: 16%; min-height: 45px; background: var(--track); 
            border-bottom: 1px solid rgba(255,255,255,0.05); position: relative; 
            display: flex; align-items: center; border-radius: 8px; margin-bottom: 4px;
        }

        .finish-line { 
            position: absolute; right: 15px; top: 0; bottom: 0; width: 8px; 
            background: repeating-linear-gradient(0deg, #fff, #fff 5px, #000 5px, #000 10px);
            border-left: 2px solid var(--finish);
        }
        
        .horse { 
            position: absolute; left: 5px; transition: left 0.1s linear; 
            display: flex; align-items: center; z-index: 5;
        }
        .horse-icon { width: 32px; height: 32px; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5)); }
        .horse-name { 
            font-size: 8px; font-weight: 900; background: rgba(0,0,0,0.7); 
            padding: 1px 4px; border-radius: 3px; margin-right: -5px; white-space: nowrap;
        }

        /* لوحة التحكم السفلية */
        .controls { 
            background: #0f172a; padding: 15px 15px calc(15px + env(safe-area-inset-bottom)); 
            border-top: 1px solid #334155; border-radius: 20px 20px 0 0; flex-shrink: 0;
        }

        .bet-grid { 
            display: flex; gap: 8px; overflow-x: auto; padding-bottom: 10px;
            scrollbar-width: none; /* Hide scrollbar for Firefox */
        }
        .bet-grid::-webkit-scrollbar { display: none; } /* Hide scrollbar for Chrome/Safari */

        .bet-card { 
            min-width: 85px; background: #1e293b; border: 2px solid transparent; 
            border-radius: 12px; padding: 8px; text-align: center; transition: 0.2s;
        }
        .bet-card.active { border-color: var(--gold); background: rgba(245,158,11,0.15); transform: scale(0.95); }
        .bet-card .name { display: block; font-size: 10px; opacity: 0.8; }
        .bet-card .odd { font-weight: 900; color: var(--gold); font-size: 15px; }

        .input-group { display: flex; gap: 10px; margin-top: 5px; }
        input { 
            flex: 1; background: #020617; border: 1px solid #334155; padding: 12px; 
            border-radius: 12px; color: var(--gold); text-align: center; font-weight: 900; font-size: 18px; outline: none; 
        }
        .start-btn { 
            flex: 1.5; background: linear-gradient(135deg, #f59e0b, #d97706); 
            color: black; border: none; border-radius: 12px; font-weight: 900; font-size: 16px; 
        }
        .start-btn:disabled { opacity: 0.4; filter: grayscale(1); }
    </style>
</head>
<body>

    <div class="header">
        <div class="brand">VEXA<span>RACING</span></div>
        <div class="bal-box" id="user-bal">0.00 EGP</div>
    </div>

    <div class="race-container" id="race-field">
        </div>

    <div class="controls">
        <div class="bet-grid" id="bet-options">
            </div>

        <div class="input-group">
            <input type="number" id="bet-amt" value="10" inputmode="numeric">
            <button class="start-btn" id="race-btn">بدء السباق 🏁</button>
        </div>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-app.js";
    import { getFirestore, doc, onSnapshot, updateDoc, increment } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-firestore.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-auth.js";

    const config = { apiKey: "AIzaSyAzcP_T8x5ouwwKkhadtBTdsUxk3XqwJec", authDomain: "vexa-4b2fb.firebaseapp.com", projectId: "vexa-4b2fb", appId: "1:977620445308:web:fec22230e1fbb30c8881f9" };
    const app = initializeApp(config);
    const db = getFirestore(app);
    const auth = getAuth(app);

    const horses = [
        { id: 0, name: "البرق", color: "#ef4444", odd: 2.10 },
        { id: 1, name: "الصخرة", color: "#3b82f6", odd: 3.50 },
        { id: 2, name: "الريح", color: "#10b981", odd: 1.80 },
        { id: 3, name: "الزعيم", color: "#f59e0b", odd: 5.00 },
        { id: 4, name: "السراب", color: "#a855f7", odd: 8.0 }
    ];

    let balance = 0, uid = "", selectedHorse = null, isRacing = false;

    function horseSvg(color) {
        return `<svg class="horse-icon" viewBox="0 0 512 512" fill="${color}">
            <path d="M495.2 96.2c-12.7-18.7-37.4-23.7-56.1-11l-34 23.1c-13.6-21.7-34.1-39.2-58.4-50.5-23.9-11.2-50.6-16.7-77.5-16.7H256c-24 0-47.5 4.5-69.8 13.3-22.3 8.8-42.3 21.6-58.8 38.1l-14.7 14.7c-31.2 31.2-31.2 81.9 0 113.1l14.7 14.7c16.5 16.5 36.5 29.3 58.8 38.1 22.3 8.8 45.8 13.3 69.8 13.3h13.2c-1.3 12.5-2 25.1-2 37.8v96h-64c-17.7 0-32 14.3-32 32s14.3 32 32 32h192c17.7 0 32-14.3 32-32s-14.3-32-32-32h-64V325.8c0-36.2 12.3-71.4 35-99.7 16.1-20.1 39-33.8 64.5-38.6l31.1-5.9c18.7-3.6 30.9-21.6 27.4-40.3-3.6-18.7-21.6-30.9-40.3-27.4l-31.1 5.9c-10.4 2-20 7.8-27.1 16.4l-11.4 13.8c-10.7-5.5-22.2-9.6-34.1-12.1l20.4-13.9c18.7-12.7 23.7-37.4 11-56.1z"/>
        </svg>`;
    }

    onAuthStateChanged(auth, user => {
        if(user) {
            uid = user.uid;
            onSnapshot(doc(db,"users",uid), d => {
                balance = d.data()?.walletBalance || 0;
                document.getElementById('user-bal').innerText = balance.toFixed(2) + " EGP";
            });
            initUI();
        }
    });

    function initUI() {
        const field = document.getElementById('race-field');
        const options = document.getElementById('bet-options');
        field.innerHTML = ''; options.innerHTML = '';

        horses.forEach(h => {
            field.innerHTML += `<div class="track"><div class="finish-line"></div><div class="horse" id="horse-${h.id}" style="left:5px">${horseSvg(h.color)}<span class="horse-name">${h.name}</span></div></div>`;
            
            const card = document.createElement('div');
            card.className = 'bet-card';
            card.onclick = () => {
                if(isRacing) return;
                selectedHorse = h;
                document.querySelectorAll('.bet-card').forEach(c => c.classList.remove('active'));
                card.classList.add('active');
                if(navigator.vibrate) navigator.vibrate(30);
            };
            card.innerHTML = `<span class="name">${h.name}</span><span class="odd">x${h.odd.toFixed(2)}</span>`;
            options.appendChild(card);
        });
    }

    document.getElementById('race-btn').onclick = async () => {
        const amt = parseFloat(document.getElementById('bet-amt').value);
        if(!selectedHorse) return Swal.fire("عفواً", "اختر حصانك أولاً", "warning");
        if(amt > balance || amt <= 0) return Swal.fire("خطأ", "الرصيد غير كافٍ", "error");

        isRacing = true;
        document.getElementById('race-btn').disabled = true;
        await updateDoc(doc(db, "users", uid), { walletBalance: increment(-amt) });

        let winners = [];
        const trackWidth = document.querySelector('.track').offsetWidth - 45;
        
        const timer = setInterval(() => {
            horses.forEach(h => {
                const el = document.getElementById(`horse-${h.id}`);
                let currentLeft = parseFloat(el.style.left);
                
                // حركة عشوائية لزيادة الحماس
                const speed = Math.random() * 6 + 1.5; 
                if(currentLeft < trackWidth) {
                    el.style.left = (currentLeft + speed) + "px";
                } else if (!winners.includes(h.id)) {
                    winners.push(h.id);
                }
            });

            if(winners.length === horses.length) {
                clearInterval(timer);
                finishRace(winners[0], amt);
            }
        }, 50);
    };

    async function finishRace(winnerId, amt) {
        const winner = horses[winnerId];
        const isWinner = selectedHorse.id === winnerId;
        
        if(isWinner) {
            const payout = amt * selectedHorse.odd;
            await updateDoc(doc(db, "users", uid), { walletBalance: increment(payout) });
            Swal.fire({ title: "مبروك! 🎉", text: `حصانك "${winner.name}" فاز! ربحت ${payout.toFixed(2)} ج.م`, icon: "success", confirmButtonText: "رائع" });
            if(navigator.vibrate) navigator.vibrate([100, 50, 100]);
        } else {
            Swal.fire({ title: "حظ أوفر", text: `الفائز هو "${winner.name}"`, icon: "error", confirmButtonText: "حاول مجدداً" });
        }

        setTimeout(() => {
            isRacing = false;
            document.getElementById('race-btn').disabled = false;
            horses.forEach(h => document.getElementById(`horse-${h.id}`).style.left = "5px");
        }, 1500);
    }
</script>
</body>
</html>
