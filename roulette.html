<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Win100 | Pro Roulette Mobile</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root { --gold: #f59e0b; --bg: #020617; --red: #ef4444; --black: #1e293b; --green: #10b981; }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; }
        
        body { 
            font-family: 'Cairo', sans-serif; background: var(--bg); color: white; 
            height: 100dvh; display: flex; flex-direction: column; overflow: hidden; 
        }

        .header { 
            height: 60px; padding: 0 15px; display: flex; justify-content: space-between; 
            align-items: center; background: #0f172a; border-bottom: 1px solid rgba(255,255,255,0.05); flex-shrink: 0;
        }
        .brand { font-weight: 900; font-size: 18px; }
        .brand span { color: var(--gold); }
        .balance-badge { border: 1px solid var(--gold); padding: 4px 12px; border-radius: 10px; background: rgba(245, 158, 11, 0.05); }
        .balance-value { color: var(--gold); font-weight: 900; font-size: 14px; }

        /* منطقة اللعبة المركزية - مرنة جداً */
        .game-container {
            flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
            padding: 10px; position: relative; min-height: 0;
        }

        .wheel-wrapper {
            width: 80vw; max-width: 320px; aspect-ratio: 1; position: relative;
        }

        .pointer {
            position: absolute; top: -10px; left: 50%; transform: translateX(-50%);
            width: 30px; height: 40px; z-index: 10; fill: var(--gold);
            filter: drop-shadow(0 0 5px rgba(0,0,0,0.8));
        }

        #wheelCanvas {
            width: 100%; height: 100%; border-radius: 50%; border: 6px solid #1e293b;
            transition: transform 6s cubic-bezier(0.15, 0, 0.1, 1);
            box-shadow: 0 10px 40px rgba(0,0,0,0.6);
        }

        #status-display {
            margin-top: 15px; font-size: 13px; color: #94a3b8; font-weight: 700;
            text-align: center; min-height: 20px;
        }

        /* التحكم السفلي */
        .footer-controls {
            background: #0f172a; padding: 15px 15px calc(15px + env(safe-area-inset-bottom));
            border-top: 1px solid rgba(255,255,255,0.1); border-radius: 25px 25px 0 0;
            display: flex; flex-direction: column; gap: 12px; flex-shrink: 0;
        }

        .bet-buttons { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
        
        .bet-btn {
            padding: 12px 0; border: 2px solid transparent; border-radius: 12px;
            color: white; font-weight: 900; font-size: 11px; transition: 0.2s;
        }
        .bet-btn.selected { border-color: var(--gold); transform: scale(0.95); box-shadow: 0 0 15px rgba(245, 158, 11, 0.4); }

        .input-group {
            background: #020617; border: 1px solid #1e293b; border-radius: 12px;
            display: flex; align-items: center; overflow: hidden;
        }
        .input-group input {
            width: 100%; background: transparent; border: none; color: var(--gold);
            padding: 10px; text-align: center; font-weight: 900; font-size: 20px; outline: none;
        }

        .spin-btn {
            width: 100%; padding: 15px; border-radius: 12px; border: none;
            background: linear-gradient(135deg, #f59e0b, #d97706); color: #000;
            font-weight: 900; font-size: 18px; box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        .spin-btn:disabled { opacity: 0.4; filter: grayscale(1); }

    </style>
</head>
<body>

    <div class="header">
        <div class="brand">WIN<span>100</span></div>
        <div class="balance-badge">
            <span class="balance-value" id="user-balance">0.00</span>
            <span style="font-size: 10px; color: #64748b; font-weight: 900;">EGP</span>
        </div>
    </div>

    <div class="game-container">
        <div class="wheel-wrapper">
            <svg class="pointer" viewBox="0 0 50 50">
                <path d="M25 50 L10 10 A5 5 0 0 1 20 5 L30 5 A5 5 0 0 1 40 10 Z" />
            </svg>
            <canvas id="wheelCanvas" width="500" height="500"></canvas>
        </div>
        <div id="status-display">اختر لونك لبدء الجولة 🎲</div>
    </div>

    <div class="footer-controls">
        <div class="bet-buttons">
            <button id="red" class="bet-btn" style="background:var(--red)">أحمر (×2)</button>
            <button id="black" class="bet-btn" style="background:var(--black)">أسود (×2)</button>
            <button id="green" class="bet-btn" style="background:var(--green)">أخضر (×36)</button>
        </div>
        
        <div class="input-group">
            <input type="number" id="bet-amount" value="10" inputmode="numeric">
        </div>

        <button id="spin-button" class="spin-btn">تأكيد الرهان</button>
    </div>

<script type="module">
    // --- نفس منطق الـ Firebase والـ JS اللي أنت كاتبه بس مع تعديل خفيف للحماية ---
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-app.js";
    import { getFirestore, doc, onSnapshot, updateDoc, increment, getDoc } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-firestore.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAzcP_T8x5ouwwKkhadtBTdsUxk3XqwJec",
        authDomain: "vexa-4b2fb.firebaseapp.com",
        projectId: "vexa-4b2fb",
        appId: "1:977620445308:web:fec22230e1fbb30c8881f9"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    const canvas = document.getElementById("wheelCanvas");
    const ctx = canvas.getContext("2d");
    const spinBtn = document.getElementById("spin-button");
    const statusText = document.getElementById("status-display");

    const wheelNumbers = [0, 32, 15, 19, 4, 21, 2, 25, 17, 34, 6, 27, 13, 36, 11, 30, 8, 23, 10, 5, 24, 16, 33, 1, 20, 14, 31, 9, 22, 18, 29, 7, 28, 12, 35, 3, 26];
    const colors = wheelNumbers.map(n => n === 0 ? "#10b981" : ([1,3,5,7,9,12,14,16,18,19,21,23,25,27,30,32,34,36].includes(n) ? "#ef4444" : "#1e293b"));

    let currentRotation = 0, balance = 0, uid = "", selectedType = "", isSpinning = false;

    function drawWheel() {
        const arc = (Math.PI * 2) / wheelNumbers.length;
        wheelNumbers.forEach((num, i) => {
            const angle = i * arc;
            ctx.beginPath(); ctx.fillStyle = colors[i]; ctx.moveTo(250, 250);
            ctx.arc(250, 250, 250, angle, angle + arc); ctx.fill();
            ctx.save(); ctx.translate(250, 250); ctx.rotate(angle + arc / 2);
            ctx.textAlign = "right"; ctx.fillStyle = "white"; ctx.font = "bold 18px Cairo";
            ctx.fillText(num.toString(), 240, 5); ctx.restore();
        });
    }

    document.querySelectorAll('.bet-btn').forEach(btn => {
        btn.onclick = () => {
            if (isSpinning) return;
            document.querySelectorAll('.bet-btn').forEach(b => b.classList.remove('selected'));
            btn.classList.add('selected');
            selectedType = btn.id;
            if(navigator.vibrate) navigator.vibrate(30);
        };
    });

    onAuthStateChanged(auth, user => {
        if (user) {
            uid = user.uid;
            onSnapshot(doc(db, "users", uid), d => {
                if(d.exists()){
                    balance = d.data()?.walletBalance || 0;
                    document.getElementById('user-balance').innerText = balance.toFixed(2);
                }
            });
        }
    });

    spinBtn.onclick = async () => {
        if (isSpinning) return;
        const bet = parseFloat(document.getElementById('bet-amount').value);
        if (!selectedType) return Swal.fire("تنبيه", "اختر لوناً أولاً!", "warning");
        if (bet > balance || bet <= 0) return Swal.fire("خطأ", "رصيدك غير كافٍ", "error");

        isSpinning = true;
        spinBtn.disabled = true;
        statusText.innerText = "العجلة تدور الآن..";
        
        await updateDoc(doc(db, "users", uid), { walletBalance: increment(-bet) });

        // تحديد النتيجة (نفس خوارزميتك)
        const selectedIndex = Math.floor(Math.random() * wheelNumbers.length); 
        
        const sectorArc = 360 / wheelNumbers.length;
        const targetAngle = (360 - (selectedIndex * sectorArc) - (sectorArc / 2) - 90);
        const finalRotation = currentRotation + 3600 + (targetAngle - (currentRotation % 360));

        canvas.style.transform = `rotate(${finalRotation}deg)`;
        currentRotation = finalRotation;

        setTimeout(async () => {
            const winNum = wheelNumbers[selectedIndex];
            const winCol = colors[selectedIndex];
            let multiplier = 0;

            if (selectedType === 'green' && winNum === 0) multiplier = 36;
            else if (selectedType === 'red' && winCol === "#ef4444") multiplier = 2;
            else if (selectedType === 'black' && winCol === "#1e293b") multiplier = 2;

            const winAmt = bet * multiplier;
            await updateDoc(doc(db, "users", uid), { walletBalance: increment(winAmt) });
            
            isSpinning = false;
            spinBtn.disabled = false;
            statusText.innerHTML = winAmt > 0 ? `<span style="color:var(--green)">مبروك! النتيجة ${winNum}</span>` : `النتيجة ${winNum}.. حظ أوفر!`;
            if(winAmt > 0 && navigator.vibrate) navigator.vibrate([100, 50, 100]);
        }, 6000);
    };

    drawWheel();
</script>
</body>
</html>
