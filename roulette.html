<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Win100 | Professional Roulette</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root { --gold: #f59e0b; --bg: #020617; --red: #ef4444; --black: #1e293b; --green: #10b981; }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; }
        
        body { 
            font-family: 'Cairo', sans-serif; 
            background: var(--bg); 
            color: white; 
            height: 100vh; 
            width: 100vw;
            display: flex; 
            flex-direction: column; 
            overflow: hidden; 
            position: relative;
        }

        /* رأس الصفحة */
        .header { 
            height: 65px;
            padding: 0 20px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            background: #0f172a;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            z-index: 10;
        }
        .brand { font-weight: 900; font-size: 20px; }
        .brand span { color: var(--gold); }
        .balance-badge { 
            border: 1px solid var(--gold); 
            padding: 6px 15px; 
            border-radius: 10px; 
            display: flex; 
            gap: 8px; 
            align-items: center;
            background: rgba(245, 158, 11, 0.05);
        }
        .balance-value { color: var(--gold); font-weight: 900; font-size: 16px; }

        /* منطقة العرض المركزية */
        .game-main { 
            position: absolute;
            top: 65px;
            bottom: 250px; 
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 10px;
        }

        .wheel-box { 
            position: relative; 
            width: 75vw; 
            max-width: 290px; 
            aspect-ratio: 1;
        }
        
        .pointer-svg { 
            position: absolute; 
            top: -15px; 
            left: 50%; 
            transform: translateX(-50%); 
            width: 38px; 
            z-index: 5; 
            filter: drop-shadow(0 2px 5px rgba(0,0,0,0.5));
        }

        canvas { 
            width: 100%; 
            height: 100%; 
            border-radius: 50%; 
            border: 8px solid #1e293b; 
            transition: transform 6s cubic-bezier(0.15, 0, 0.1, 1); 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        #status-display { 
            margin-top: 20px;
            text-align: center; 
            color: #94a3b8; 
            font-size: 14px;
            font-weight: 700;
            padding: 0 20px;
            min-height: 40px;
        }

        /* لوحة التحكم السفلية */
        .control-panel { 
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 250px;
            background: #0f172a; 
            padding: 15px 20px calc(15px + env(safe-area-inset-bottom)); 
            border-top: 1px solid rgba(255,255,255,0.1); 
            border-radius: 25px 25px 0 0;
            display: flex;
            flex-direction: column;
            gap: 12px;
            z-index: 20;
        }

        .options-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
        .bet-option { 
            padding: 15px 0; 
            border: 2px solid transparent; 
            border-radius: 12px; 
            color: white; 
            font-weight: 900; 
            font-size: 12px;
            transition: 0.2s;
        }
        .bet-option.selected { border-color: var(--gold); box-shadow: 0 0 15px rgba(245, 158, 11, 0.4); transform: scale(1.02); }

        .input-field { 
            background: #020617; 
            border: 1px solid #1e293b; 
            border-radius: 12px; 
            display: flex; 
            align-items: center; 
            padding: 0 15px; 
        }
        .input-field input { flex: 1; background: transparent; border: none; color: var(--gold); padding: 12px; text-align: center; font-weight: 900; font-size: 22px; outline: none; }
        
        .action-btn { 
            width: 100%; 
            padding: 18px; 
            border-radius: 12px; 
            border: none; 
            background: linear-gradient(135deg, #f59e0b, #d97706); 
            color: #000; 
            font-weight: 900; 
            font-size: 18px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        .action-btn:disabled { opacity: 0.5; filter: grayscale(1); }
    </style>
</head>
<body>

    <div class="header">
        <div class="brand">WIN<span>100</span></div>
        <div class="balance-badge">
            <span class="balance-value" id="user-balance">0.00</span>
            <span style="font-size: 12px; color: #64748b; font-weight: 900;">EGP</span>
        </div>
    </div>

    <div class="game-main">
        <div class="wheel-box">
            <svg class="pointer-svg" viewBox="0 0 50 50">
                <path d="M25 50 L15 10 A5 5 0 0 1 20 5 L30 5 A5 5 0 0 1 35 10 Z" fill="#f59e0b" stroke="#fff" stroke-width="2"/>
            </svg>
            <canvas id="wheelCanvas" width="500" height="500"></canvas>
        </div>
        <div id="status-display">يرجى تحديد خيار الرهان لبدء الجولة.</div>
    </div>

    <div class="control-panel">
        <div class="options-row">
            <button id="red" class="bet-option" style="background:var(--red)">أحمر (×2)</button>
            <button id="black" class="bet-option" style="background:var(--black)">أسود (×2)</button>
            <button id="green" class="bet-option" style="background:var(--green)">أخضر (×36)</button>
        </div>
        <div class="input-field">
            <input type="number" id="bet-amount" value="10" inputmode="numeric">
        </div>
        <button id="spin-button" class="action-btn" disabled>تأكيد الرهان 🎲</button>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-app.js";
    import { getFirestore, doc, onSnapshot, updateDoc, increment, getDoc } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-firestore.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAzcP_T8x5ouwwKkhadtBTdsUxk3XqwJec",
        authDomain: "vexa-4b2fb.firebaseapp.com",
        projectId: "vexa-4b2fb",
        appId: "1:977620445308:web:fec22230e1fbb30c8881f9"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    const canvas = document.getElementById("wheelCanvas");
    const ctx = canvas.getContext("2d");
    const spinBtn = document.getElementById("spin-button");
    const statusText = document.getElementById("status-display");

    const wheelNumbers = [0, 32, 15, 19, 4, 21, 2, 25, 17, 34, 6, 27, 13, 36, 11, 30, 8, 23, 10, 5, 24, 16, 33, 1, 20, 14, 31, 9, 22, 18, 29, 7, 28, 12, 35, 3, 26];
    const colors = wheelNumbers.map(n => n === 0 ? "#10b981" : ([1,3,5,7,9,12,14,16,18,19,21,23,25,27,30,32,34,36].includes(n) ? "#ef4444" : "#1e293b"));

    let currentRotation = 0, balance = 0, uid = "", selectedType = "";

    function drawWheel() {
        const arc = (Math.PI * 2) / wheelNumbers.length;
        wheelNumbers.forEach((num, i) => {
            const angle = i * arc;
            ctx.beginPath(); ctx.fillStyle = colors[i]; ctx.moveTo(250, 250);
            ctx.arc(250, 250, 250, angle, angle + arc); ctx.fill();
            ctx.save(); ctx.translate(250, 250); ctx.rotate(angle + arc / 2);
            ctx.textAlign = "right"; ctx.fillStyle = "white"; ctx.font = "bold 16px Cairo";
            ctx.fillText(num.toString(), 240, 5); ctx.restore();
        });
    }

    document.querySelectorAll('.bet-option').forEach(btn => {
        btn.onclick = () => {
            document.querySelectorAll('.bet-option').forEach(b => b.classList.remove('selected'));
            btn.classList.add('selected');
            selectedType = btn.id;
            if(navigator.vibrate) navigator.vibrate(30);
        };
    });

    onAuthStateChanged(auth, user => {
        if (user) {
            uid = user.uid;
            spinBtn.disabled = false;
            onSnapshot(doc(db, "users", uid), d => {
                if(d.exists()){
                    balance = d.data().walletBalance || 0;
                    document.getElementById('user-balance').innerText = balance.toFixed(2);
                }
            });
        }
    });

    spinBtn.onclick = async () => {
        const bet = parseFloat(document.getElementById('bet-amount').value);
        if (!selectedType) return Swal.fire("تنبيه", "يرجى تحديد خيار الرهان.", "info");
        if (bet > balance || bet <= 0) return Swal.fire("خطأ", "رصيد المحفظة غير كافٍ.", "error");

        spinBtn.disabled = true;
        statusText.innerText = "جاري تدوير العجلة... ترقب النتيجة.";
        await updateDoc(doc(db, "users", uid), { walletBalance: increment(-bet) });

        const userSnap = await getDoc(doc(db, "users", uid));
        const userData = userSnap.data();
        const gameCount = userData?.rouletteGames || 0;
        const lossStreak = userData?.lossStreak || 0;

        let selectedIndex;
        let randVal = Math.random();

        // منطق المكسب الذكي
        if (gameCount < 3) {
            const wins = wheelNumbers.map((n, i) => i).filter(i => (selectedType === 'red' && colors[i] === "#ef4444") || (selectedType === 'black' && colors[i] === "#1e293b") || (selectedType === 'green' && wheelNumbers[i] === 0));
            selectedIndex = wins[Math.floor(Math.random() * wins.length)];
        } 
        else if (lossStreak >= 2) {
            const recovery = wheelNumbers.map((n, i) => i).filter(i => (selectedType === 'red' && colors[i] === "#ef4444") || (selectedType === 'black' && colors[i] === "#1e293b"));
            selectedIndex = recovery[Math.floor(Math.random() * recovery.length)];
        }
        else {
            let isWinningRound = randVal < 0.45;
            const pool = wheelNumbers.map((n, i) => i).filter(i => {
                const isMatch = (selectedType === 'red' && colors[i] === "#ef4444") || (selectedType === 'black' && colors[i] === "#1e293b") || (selectedType === 'green' && wheelNumbers[i] === 0);
                return isWinningRound ? isMatch : !isMatch;
            });
            selectedIndex = pool[Math.floor(Math.random() * pool.length)];
        }

        const sectorArc = 360 / wheelNumbers.length;
        const targetAngle = (360 - (selectedIndex * sectorArc) - (sectorArc / 2) - 90);
        const finalRotation = currentRotation + 4320 + (targetAngle - (currentRotation % 360));

        canvas.style.transform = `rotate(${finalRotation}deg)`;
        currentRotation = finalRotation;

        setTimeout(async () => {
            const winNum = wheelNumbers[selectedIndex];
            const winCol = colors[selectedIndex];
            let multiplier = 0;

            if (selectedType === 'green' && winNum === 0) multiplier = 36;
            else if (selectedType === 'red' && winCol === "#ef4444") multiplier = 2;
            else if (selectedType === 'black' && winCol === "#1e293b") multiplier = 2;

            const winAmt = bet * multiplier;
            await updateDoc(doc(db, "users", uid), { 
                walletBalance: increment(winAmt), 
                rouletteGames: increment(1),
                lossStreak: winAmt > 0 ? 0 : increment(1)
            });
            
            spinBtn.disabled = false;
            if (winAmt > 0) {
                statusText.innerHTML = `<span style="color:var(--green)">النتيجة: ${winNum}. مبروك، ربحت ${winAmt.toFixed(2)} EGP!</span>`;
                if(navigator.vibrate) navigator.vibrate([100, 50, 100]);
            } else {
                statusText.innerHTML = winNum === 0 ? `<span style="color:var(--gold)">استقرت الكرة على الصفر. نرجو لك حظاً أوفر.</span>` : `النتيجة: ${winNum}. نرجو لك حظاً أوفر في الجولات القادمة.`;
            }
        }, 6000);
    };

    drawWheel();
</script>
</body>
</html>
